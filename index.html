<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stanford Research Data Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --gold: #ffd700; --st-red: #8c1515; --bg: #050508; --glass: rgba(15, 15, 25, 0.9); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Mask Layer */
        #mask { position: fixed; inset: 0; background: #fff; z-index: 10000; color: #333; display: none; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; }
        #mask h1 { color: var(--st-red); margin: 0; }

        /* Layout */
        header { height: 70px; border-bottom: 2px solid var(--st-red); display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        #score { font-family: 'Orbitron'; font-size: 2.2rem; color: var(--gold); margin: 0; }

        .main-grid { display: grid; grid-template-columns: 350px 1fr 350px; gap: 10px; height: calc(100vh - 70px); padding: 10px; box-sizing: border-box; }
        .panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        
        .tabs { display: flex; background: #000; overflow-x: auto; scrollbar-width: none; }
        .tab-btn { flex-shrink: 0; padding: 12px; border: none; background: none; color: #555; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; }
        .tab-btn.active { color: var(--neon); border-bottom: 2px solid var(--neon); }
        
        .content { flex: 1; overflow-y: auto; padding: 15px; display: none; scrollbar-width: thin; }
        .content.active { display: block; }

        /* Elements */
        .item-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .item-card:hover { background: rgba(255,255,255,0.07); }
        .item-card.locked { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; }
        .icon { font-size: 1.5rem; margin-right: 12px; width: 30px; text-align: center; }
        
        #llama-target { font-size: 140px; cursor: pointer; transition: transform 0.05s; user-select: none; filter: drop-shadow(0 0 20px rgba(0,255,204,0.2)); }
        #llama-target:active { transform: scale(0.95); }

        .l-row { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem; }
        .l-row.me { color: var(--gold); background: rgba(255,215,0,0.1); }

        /* Navigation Arrows */
        .nav-arrow { position: fixed; bottom: 20px; font-size: 2rem; color: var(--neon); cursor: pointer; z-index: 1000; opacity: 0.5; transition: 0.3s; text-decoration: none; }
        .nav-arrow:hover { opacity: 1; transform: scale(1.2); }
        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }
    </style>
</head>
<body>

<div id="mask">
    <h1>Stanford University</h1>
    <p>Research Data Portal</p>
    <input type="password" id="mask-input" placeholder="Enter Access Code" style="padding:10px; border:1px solid #ccc; border-radius:5px;">
    <p style="font-size: 0.7rem; color: #999;">Password: llama</p>
</div>

<header>
    <div id="score">0</div>
    <div style="font-size:0.7rem; font-family:'Orbitron'; color:var(--neon)">LPS: <span id="lps-val">0</span> | BONUS: +<span id="bonus-val">0</span>%</div>
</header>

<div class="main-grid">
    <div class="panel">
        <div class="tabs">
            <button class="tab-btn active" onclick="tab('L', 't-tree')">TREE</button>
            <button class="tab-btn" onclick="tab('L', 't-skins')">SKINS</button>
            <button class="tab-btn" onclick="tab('L', 't-legacy')">FLEECE</button>
        </div>
        <div id="t-tree" class="content active"><div id="tree-list"></div></div>
        <div id="t-skins" class="content"><div id="skins-grid"></div></div>
        <div id="t-legacy" class="content">
            <h3 style="color:var(--gold)">Prestige</h3>
            <div id="leg-info" style="margin-bottom:10px;">Next Level at: 100K</div>
            <button onclick="prestige()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:900; cursor:pointer;">ASCEND</button>
        </div>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative;">
        <div id="llama-target" onclick="hit(event)">🦙</div>
        <div style="margin-top:20px; font-family:'Orbitron'; font-size:0.8rem; color:var(--gold)" id="active-skin-name">Classic Llama</div>
    </div>

    <div class="panel">
        <div class="tabs">
            <button class="tab-btn active" onclick="tab('R', 't-biz')">BIZ</button>
            <button class="tab-btn" onclick="tab('R', 't-lux')">LUXURY</button>
            <button class="tab-btn" onclick="tab('R', 't-rank')">RANK</button>
        </div>
        <div id="t-biz" class="content active"><div id="biz-list"></div></div>
        <div id="t-lux" class="content"><div id="lux-list"></div></div>
        <div id="t-rank" class="content"><div id="rank-list">Loading...</div></div>
    </div>
</div>

<a href="country.html" class="nav-arrow arrow-left">◀</a>
<a href="corp.html" class="nav-arrow arrow-right">▶</a>

<script>
    // --- ДАННЫЕ (30 бизнесов, 20 имуществ, 30 скинов) ---
    const DB = {
        biz: Array.from({length: 35}, (_, i) => ({
            id: 'b'+i, n: ["Homework Help", "Coffee Stall", "Vending Machine", "Cyber Cafe", "Tech Startup", "Crypto Mine", "AI Lab", "Space Port", "Quantum Hub", "Dyson Sphere"][i%10] + (i>10?` V.${Math.floor(i/10)}` : ""),
            c: Math.floor(15 * Math.pow(2.2, i)), lps: Math.floor(1 * Math.pow(2.1, i)), i: ["📝","☕","🥤","💻","🚀","⛏️","🤖","🛰️","🔮","☀️"][i%10]
        })),
        lux: Array.from({length: 25}, (_, i) => ({
            id: 'l'+i, n: ["Rolex Watch", "Tesla S", "Private Jet", "Stanford Villa", "Private Island", "Moon Base", "Mars Colony", "Diamond Castle"][i%8] + ` #${i+1}`,
            c: Math.floor(1000 * Math.pow(4, i)), i: ["⌚","🚗","🛩️","🏰","🏝️","🌑","🚀","💎"][i%8]
        })),
        skins: Array.from({length: 30}, (_, i) => ({
            id: 's'+i, n: `Skin Type-${i}`, char: ["🦙","🐫","🐑","🦌","🦄","🦁","🐯","🐉","🦖","👾"][i%10], c: i * 50000
        })),
        achs: [
            { id: 'a1', n: "Novice", req: 1000, pre: null },
            { id: 'a2', n: "Bachelor", req: 50000, pre: 'a1' },
            { id: 'a3', n: "Master", req: 1000000, pre: 'a2' },
            { id: 'a4', n: "PhD", req: 1e9, pre: 'a3' },
            { id: 'a5', n: "Dean", req: 1e12, pre: 'a4' }
        ]
    };

    let state = {
        cash: 0, total: 0, 
        biz: {}, lux: [], ach: [], 
        skin: '🦙', legacy: 0,
        name: localStorage.getItem('llama_name') || 'Res_' + Math.random().toString(36).substr(2,4)
    };
    localStorage.setItem('llama_name', state.name);

    // --- ЛОГИКА ---
    function init() {
        const saved = localStorage.getItem('llama_v4_main');
        if(saved) Object.assign(state, JSON.parse(saved));
        
        document.getElementById('llama-target').innerText = state.skin;
        renderAll();
        setInterval(() => {
            let lps = getLPS();
            state.cash += lps/10; state.total += lps/10;
            checkAchs();
            updateUI();
        }, 100);
        setInterval(syncCloud, 20000);
    }

    function hit(e) {
        let pwr = (1 + state.legacy) * (1 + (state.ach.length * 0.05));
        state.cash += pwr; state.total += pwr;
        updateUI();
    }

    function getLPS() {
        let inc = 0;
        DB.biz.forEach(b => inc += (state.biz[b.id] || 0) * b.lps);
        return inc * (1 + (state.ach.length * 0.05));
    }

    function checkAchs() {
        DB.achs.forEach(a => {
            if(!state.ach.includes(a.id)) {
                let ready = a.pre ? state.ach.includes(a.pre) : true;
                if(state.total >= a.req && ready) {
                    state.ach.push(a.id);
                    renderTree();
                }
            }
        });
    }

    function updateUI() {
        document.getElementById('score').innerText = format(state.cash);
        document.getElementById('lps-val').innerText = format(getLPS());
        document.getElementById('bonus-val').innerText = state.ach.length * 5;
        document.getElementById('leg-info').innerText = "Next Legacy Level at: " + format(Math.pow(10, 5 + state.legacy));
        save();
    }

    // --- RENDERING ---
    function renderAll() {
        renderBiz(); renderLux(); renderTree(); renderSkins(); fetchRank();
    }

    function renderBiz() {
        const list = document.getElementById('biz-list');
        list.innerHTML = DB.biz.map(b => {
            let lvl = state.biz[b.id] || 0;
            let cost = Math.floor(b.c * Math.pow(1.4, lvl));
            let locked = (b.c > 1e9 && state.total < b.c / 2);
            return `<div class="item-card ${state.cash < cost || locked ? 'locked' : ''}" onclick="buyBiz('${b.id}', ${cost})">
                <div class="icon">${locked ? '❓' : b.i}</div>
                <div style="flex:1"><b>${locked ? 'Classified' : b.n}</b><br><small>${format(cost)}</small></div>
                <div style="color:var(--gold)">Lv ${lvl}</div>
            </div>`;
        }).join('');
    }

    function renderLux() {
        const list = document.getElementById('lux-list');
        list.innerHTML = DB.lux.map(l => {
            let owned = state.lux.includes(l.id);
            return `<div class="item-card ${state.cash < l.c && !owned ? 'locked' : ''}" onclick="buyLux('${l.id}', ${l.c})">
                <div class="icon">${l.i}</div>
                <div style="flex:1"><b>${l.n}</b><br><small>${format(l.c)}</small></div>
                <div style="color:var(--neon)">${owned ? 'OWNED' : 'BUY'}</div>
            </div>`;
        }).join('');
    }

    function renderSkins() {
        const grid = document.getElementById('skins-grid');
        grid.innerHTML = DB.skins.map(s => `
            <div class="item-card" onclick="setSkin('${s.char}', ${s.c})">
                <div class="icon">${s.char}</div>
                <div style="flex:1"><b>${s.n}</b><br><small>${format(s.c)}</small></div>
            </div>
        `).join('');
    }

    function renderTree() {
        document.getElementById('tree-list').innerHTML = DB.achs.map(a => `
            <div class="item-card ${state.ach.includes(a.id) ? '' : 'locked'}">
                <div class="icon">🏆</div>
                <div><b>${a.n}</b><br><small>${format(a.req)}</small></div>
            </div>
        `).join('');
    }

    // --- ACTIONS ---
    window.buyBiz = (id, c) => { if(state.cash >= c) { state.cash -= c; state.biz[id] = (state.biz[id] || 0) + 1; renderBiz(); } };
    window.buyLux = (id, c) => { if(state.cash >= c && !state.lux.includes(id)) { state.cash -= c; state.lux.push(id); renderLux(); } };
    window.setSkin = (char, c) => { if(state.total >= c) { state.skin = char; document.getElementById('llama-target').innerText = char; } };
    
    window.prestige = () => {
        let req = Math.pow(10, 5 + state.legacy);
        if(state.total >= req && confirm("Ascend? All except achievements and legacy will reset.")) {
            state.legacy++; state.cash = 0; state.total = 0; state.biz = {}; state.lux = [];
            save(); location.reload();
        }
    };

    // --- SYSTEM ---
    function format(n) {
        if(n < 1000) return Math.floor(n);
        let e = Math.floor(Math.log10(n)/3);
        return (n/Math.pow(1000,e)).toFixed(2) + ["","K","M","B","T","Q","Sx"][e];
    }
    function tab(side, id) {
        const container = document.getElementById(id).parentElement;
        container.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        container.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
    function save() { localStorage.setItem('llama_v4_main', JSON.stringify(state)); }

    // Mask Input
    document.getElementById('mask-input').oninput = (e) => { if(e.target.value === 'llama') { document.getElementById('mask').style.display='none'; e.target.value=''; } };
    window.onkeydown = e => { if(e.key === '`') document.getElementById('mask').style.display='flex'; };

    // Fake Rank (Cloud placeholder)
    async function fetchRank() {
        document.getElementById('rank-list').innerHTML = `<div class="l-row me"><span>#1 ${state.name}</span><span>${format(state.total)}</span></div>` + 
        Array.from({length:9}, (_,i)=>`<div class="l-row"><span>#${i+2} Researcher_${i}</span><span>${format(state.total/(i+2))}</span></div>`).join('');
    }

    window.onload = init;
</script>
</body>
</html>
