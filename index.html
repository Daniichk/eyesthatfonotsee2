<script>
    // --- FORMATTING UTILITY ---
    function formatNum(n) {
        if (n < 1e3) return n.toFixed(0);
        const suffixes = [
            { v: 1e3, s: "K" },   { v: 1e6, s: "M" },   { v: 1e9, s: "B" },
            { v: 1e12, s: "T" },  { v: 1e15, s: "Q" },  { v: 1e18, s: "Qi" },
            { v: 1e21, s: "Sx" }, { v: 1e24, s: "Sp" }
        ];
        let index = suffixes.length - 1;
        while (index >= 0 && n < suffixes[index].v) index--;
        return (n / suffixes[index].v).toFixed(2) + suffixes[index].s;
    }

    // --- NAVIGATION ---

            overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';

            e.preventDefault(); 
            tap({ clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 });

            { id: 's15', n: "Unicorn", c: 2500000000, i: "🦄" },
            { id: 's16', n: "Golden Idol", c: 8000000000, i: "🗿" },
            { id: 's17', n: "Crystal Llama", c: 20000000000, i: "🔮" },
            { id: 's18', n: "Black Hole", c: 50000000000, i: "🌌" },
            { id: 's19', n: "God Mode", c: 100000000000, i: "⚡" },
            { id: 's20', n: "Matrix", c: 500000000000, i: "🟩" }
        ]
    };

    let state = {
        score: 0, ups: {}, biz: {}, lux: {}, skins: ['s0'], curSkin: "🦙",
        mult: 1, lps: 0, gMult: 1, rage: 0, lastClick: 0
    };

    function save() { localStorage.setItem('llama_v_final_all', JSON.stringify(state)); }
    function load() {
        let s = localStorage.getItem('llama_v_final_all');
        if(s) { state = JSON.parse(s); recalc(); updateUI(); }
    }

    function recalc() {
        state.mult = 1; state.lps = 0; state.gMult = 1;
        data.phones.forEach(p => state.mult += (state.ups[p.id] || 0) * p.p);
        data.biz.forEach(b => state.lps += (state.biz[b.id] || 0) * b.lps);
        data.luxury.forEach(l => { if(state.lux[l.id]) state.gMult *= l.b; });
        document.getElementById('llama-main').innerText = state.curSkin;
        updateStageAssets();
    }

    function updateStageAssets() {
        let html = '';
        let items = [];
        data.luxury.forEach(l => { if(state.lux[l.id]) items.push(l.i); });
        data.biz.forEach(b => { if(state.biz[b.id]) items.push(b.i); });
        items.slice(0, 40).forEach((item) => {
            let radius = 100 + Math.random() * 150; 
            let speed = 8 + Math.random() * 20; 
            let delay = -(Math.random() * speed); 
            let dir = Math.random() > 0.5 ? 'normal' : 'reverse';
            let zIndex = Math.random() > 0.5 ? 2 : 10;
            html += `<span class="orbit-item" style="--radius: ${radius}px; animation-duration: ${speed}s; animation-delay: ${delay}s; animation-direction: ${dir}; z-index: ${zIndex};">${item}</span>`;
        });
        document.getElementById('stage-assets').innerHTML = html; 
    }

    function tap(e) {
        let now = Date.now();
        if(now - state.lastClick < 150) state.rage = Math.min(state.rage + 0.1, 3);
        else state.rage = Math.max(state.rage - 0.5, 0);
        state.lastClick = now;

        let clickVal = (state.mult * state.gMult);
        if(state.rage >= 2) {
            clickVal += (state.mult * 3);
            document.getElementById('game-body').classList.add('rage-active');
            document.getElementById('rage-text').style.display = 'inline';
        } else {
            document.getElementById('game-body').classList.remove('rage-active');
            document.getElementById('rage-text').style.display = 'none';
        }
        state.score += clickVal;
        spawnText(e.clientX || window.innerWidth/2, e.clientY || window.innerHeight/2, `+${formatNum(clickVal)}`);
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = formatNum(state.score);
        document.getElementById('lps-val').innerText = formatNum(state.lps * state.gMult);
        document.getElementById('click-val').innerText = formatNum(state.mult * state.gMult);
        
        let curRank = ranks.slice().reverse().find(r => state.score >= r.req) || ranks[0];
        document.getElementById('rank-name').innerText = curRank.n;
        renderAll();
    }

    function renderAll() {
        const draw = (list, target, type) => {
            document.getElementById(target).innerHTML = list.map(d => {
                let lvl = (type === 'biz' ? state.biz[d.id] : (type === 'up' ? state.ups[d.id] : 0)) || 0;
                let cost = Math.floor(d.c * Math.pow(1.65, lvl));
                let owned = (type === 'lux' && state.lux[d.id]) || (type === 'skin' && state.skins.includes(d.id));
                return `<div class="card ${state.score < cost && !owned ? 'locked' : ''}" onclick="buy('${type}','${d.id}')">
                    <div class="b-icon">${d.i}</div>
                    <div class="b-info"><b>${d.n}</b><small>${owned ? 'OWNED' : 'Cost: '+formatNum(cost)}</small></div>
                    <div class="b-lvl">${lvl > 0 ? 'Lv '+lvl : ''}</div>
                </div>`;
            }).join('');
        };
        draw(data.phones, 'phone-list', 'up');
        draw(data.biz, 'biz-list', 'biz');
        draw(data.luxury, 'lux-list', 'lux');
        draw(data.skins, 'skin-list', 'skin');
    }

    function buy(type, id) {
        let item = [...data.phones, ...data.biz, ...data.luxury, ...data.skins].find(x => x.id === id);
        let lvl = (type === 'biz' ? state.biz[id] : (type === 'up' ? state.ups[id] : 0)) || 0;
        let cost = Math.floor(item.c * Math.pow(1.65, lvl));
        if(state.score >= cost) {
            if(type === 'lux' && !state.lux[id]) { state.score -= cost; state.lux[id] = true; }
            else if(type === 'skin') { if(!state.skins.includes(id)) { state.score -= cost; state.skins.push(id); } state.curSkin = item.i; }
            else if(type === 'biz') { state.score -= cost; state.biz[id] = lvl + 1; }
            else if(type === 'up') { state.score -= cost; state.ups[id] = lvl + 1; }
            recalc(); save(); updateUI();
        }
    }

    function getBet(id) {
        return Math.max(10, parseInt(document.getElementById(id).value) || 0);
    }

    function playSlots() {
        let bet = getBet('bet-slots');
        if(state.score < bet) return showNotif("NOT ENOUGH", "⚠️");
        state.score -= bet;
        const s = ['🍒','💎','🦙','7️⃣','🍋'];
        let t = 0;
        let iv = setInterval(() => {
            document.getElementById('sl1').innerText = s[Math.floor(Math.random()*5)];
            document.getElementById('sl2').innerText = s[Math.floor(Math.random()*5)];
            document.getElementById('sl3').innerText = s[Math.floor(Math.random()*5)];
            if(++t > 15) {
                clearInterval(iv);
                let res = [s[Math.floor(Math.random()*5)], s[Math.floor(Math.random()*5)], s[Math.floor(Math.random()*5)]];
                if(Math.random() < 0.15) res = [res[0], res[0], res[0]];
                document.getElementById('sl1').innerText = res[0]; document.getElementById('sl2').innerText = res[1]; document.getElementById('sl3').innerText = res[2];
                if(res[0] === res[1] && res[1] === res[2]) { 
                    let win = bet * 20; 
                    state.score += win; 
                    showNotif(`JACKPOT! +${formatNum(win)}`, "🎰"); 
                }
                updateUI();
            }
        }, 50);
    }

    let mActive = false, mMult = 1.0, mBomb = -1, mBet = 0;
    function startMines() {
        let bet = getBet('bet-mines');
        if(state.score < bet || mActive) return showNotif("NOT ENOUGH", "⚠️");
        state.score -= bet; mBet = bet; mActive = true; mMult = 1.0; mBomb = Math.floor(Math.random()*9);
        document.getElementById('m-start').style.display = 'none';
        document.getElementById('bet-mines').style.display = 'none';
        document.getElementById('m-cash').style.display = 'block';
        document.getElementById('m-mult').innerText = 'x1.0';
        document.getElementById('m-grid').innerHTML = Array.from({length:9}).map((_,i) => `<div class="mine-cell" onclick="hit(${i})">?</div>`).join('');
        updateUI();
    }
    
    function hit(i) {
        if(!mActive) return;
        let c = document.getElementById('m-grid').children[i];
        if(c.innerText !== '?') return;
        if(i === mBomb) { 
            c.innerText = '💣'; c.style.color = 'var(--accent)'; mActive = false; 
            setTimeout(() => { document.getElementById('m-start').style.display='block'; document.getElementById('bet-mines').style.display='block'; document.getElementById('m-cash').style.display='none'; }, 1000); 
        } else { 
            c.innerText = '💎'; c.style.color = 'var(--neon)'; mMult += 0.5; document.getElementById('m-mult').innerText = 'x'+mMult.toFixed(1); 
        }
    }
    
    function cashMines() { 
        if(!mActive) return;
        let win = Math.floor(mBet * mMult);
        state.score += win; mActive = false; 
        showNotif(`WIN +${formatNum(win)}`, "💎"); 
        document.getElementById('m-start').style.display = 'block'; document.getElementById('bet-mines').style.display='block'; document.getElementById('m-cash').style.display = 'none'; 
        updateUI(); 
    }

    let cActive = false, cMult = 1.00, cBet = 0, cTimer = null, crashPoint = 0;
    function startCrash() {
        let bet = getBet('bet-crash');
        if(state.score < bet || cActive) return showNotif("NOT ENOUGH", "⚠️");
        state.score -= bet; cBet = bet; cActive = true; cMult = 1.00;
        document.getElementById('c-start').style.display = 'none';
        document.getElementById('bet-crash').style.display = 'none';
        document.getElementById('c-cash').style.display = 'block';
        let line = document.getElementById('crash-line');
        line.style.width = '0px'; line.style.background = 'var(--neon)';
        crashPoint = (Math.random() < 0.3) ? (1 + Math.random()) : (1 + Math.random() * 5);
        if(Math.random() < 0.05) crashPoint += 10; 
        cTimer = setInterval(() => {
            cMult += 0.02 * cMult; 
            document.getElementById('c-mult').innerText = cMult.toFixed(2) + 'x';
            let progress = Math.min(100, (cMult - 1) * 10);
            line.style.width = progress + '%';
            line.style.transform = `rotate(-${Math.min(45, progress/2)}deg)`;
            if(cMult >= crashPoint) {
                clearInterval(cTimer);
                cActive = false;
                document.getElementById('c-mult').style.color = 'var(--accent)';
                line.style.background = 'var(--accent)';
                setTimeout(() => { 
                    document.getElementById('c-start').style.display='block'; 
                    document.getElementById('bet-crash').style.display='block'; 
                    document.getElementById('c-cash').style.display='none'; 
                    document.getElementById('c-mult').style.color = 'var(--neon)';
                }, 1500);
            } else {
                if(cActive) document.getElementById('c-cash').innerText = `EJECT (${formatNum(cBet * cMult)})`;
            }
        }, 100);
        updateUI();
    }
    
    function cashCrash() {
        if(!cActive) return;
        clearInterval(cTimer);
        cActive = false;
        let win = Math.floor(cBet * cMult);
        state.score += win;
        showNotif(`EJECTED! +${formatNum(win)}`, "📈");
        document.getElementById('c-start').style.display = 'block'; 
        document.getElementById('bet-crash').style.display = 'block'; 
        document.getElementById('c-cash').style.display = 'none';
        updateUI();
    }

    function tab(side, id) {
        const p = document.getElementById(id).parentElement;
        p.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        p.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(id).classList.add('active');
    }
    function spawnText(x, y, txt) {
        const d = document.createElement('div'); d.className = 'float-text'; d.style.left = x+'px'; d.style.top = y+'px';
        d.style.color = state.rage >= 2 ? 'var(--accent)' : 'var(--neon)'; d.innerText = txt; document.body.appendChild(d);
        setTimeout(() => d.remove(), 800);
    }
    function showNotif(t, i) {
        document.getElementById('n-title').innerText = t; document.getElementById('n-icon').innerText = i;
        const n = document.getElementById('notif'); n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 3000);
    }

    setInterval(() => { state.score += (state.lps * state.gMult / 10); if(state.rage > 0) state.rage = Math.max(state.rage - 0.04, 0); updateUI(); }, 100);
    load();
</script>
</body>
</html>

<script>
    let state = JSON.parse(localStorage.getItem('llama_v_final_all')) || { score: 0 };
    
    if(!state.corp) {
        state.corp = {
            active: false, industry: null, lvl: { prod: 0, mkt: 0, hr: 0 },
            office: 1, vault: 0, lastTick: Date.now()
        };
    }

    const industries = [
        { id: 'tech', n: 'NEURAL NETWORKS', i: '🧠', riskBase: 5, mult: 2, desc: 'Stable and scalable' },
        { id: 'fashion', n: 'CYBER WEAR', i: '🧥', riskBase: 15, mult: 6, desc: 'Trend dependent' },
        { id: 'space', n: 'ASTEROID MINING', i: '☄️', riskBase: 35, mult: 20, desc: 'High risk, stellar profit' } 
    ];

    const officeStages = [
        { lvl: 1, icon: '📦', n: 'BASEMENT', cost: 0 },
        { lvl: 2, icon: '🏢', n: 'OFFICE CENTER', cost: 1e12 },
        { lvl: 3, icon: '🏙️', n: 'SKYSCRAPER', cost: 1e16 },
        { lvl: 4, icon: '💎', n: 'ORBITAL STATION', cost: 1e20 }
    ];

    function fNum(n) {
        if (n < 1e6) return n.toLocaleString();
        if (n < 1e9) return (n/1e6).toFixed(2) + "M";
        if (n < 1e12) return (n/1e9).toFixed(2) + "B";
        if (n < 1e15) return (n/1e12).toFixed(2) + "T";
        if (n < 1e18) return (n/1e15).toFixed(2) + "Q";
        return n.toExponential(2);
    }

    function init() {
        if(!state.corp.active) {
            document.getElementById('setup-overlay').style.display = 'flex';
            document.getElementById('industry-list').innerHTML = industries.map(ind => `

    function startCorp(id) {
        state.corp.active = true;
        state.corp.industry = id;
        document.getElementById('setup-overlay').style.display = 'none';

        updateUI();

    function upgradeDept(type) {
        let currentLvl = state.corp.lvl[type];
        let cost = 5e11 * Math.pow(8, currentLvl); 
        
        if(state.score >= cost) {
            state.score -= cost;
            state.corp.lvl[type]++;
            save();
            updateUI();
        }
    }

    function upgradeOffice() {
        let next = officeStages.find(s => s.lvl === state.corp.office + 1);
        if(next && state.score >= next.cost) {
            state.score -= next.cost;
            state.corp.office++;
            save();
            updateUI();
        }
    }

    function collectMoney(e) {
        if(state.corp.vault <= 0) return;
        
        // Анимация цифр
        const anim = document.createElement('div');
        anim.className = 'cash-anim';
        anim.innerText = '+' + fNum(state.corp.vault);
        anim.style.left = e.clientX + 'px';
        anim.style.top = e.clientY + 'px';
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 1000);

        state.score += state.corp.vault;
        state.corp.vault = 0;
        save();
        updateUI();
    }

    function calcIncome() {
        if(!state.corp.active) return 0;
        let ind = industries.find(i => i.id === state.corp.industry);
        let base = (state.corp.lvl.prod + 1) * (state.corp.lvl.mkt + 1) * 5e8;
        return base * ind.mult * Math.pow(2, state.corp.office - 1);
    }

    function calcRisk() {
        if(!state.corp.active) return 0;
        let ind = industries.find(i => i.id === state.corp.industry);
        let risk = ind.riskBase + (state.corp.lvl.mkt * 3) - (state.corp.lvl.hr * 5) - (state.corp.office * 2);
        return Math.max(2, Math.min(95, risk));
    }

    function updateUI() {
        if(!state.corp.active) return;

        document.getElementById('corp-balance').innerText = "$" + fNum(state.score);
        document.getElementById('corp-income').innerText = "+" + fNum(calcIncome());
        document.getElementById('vault-amount').innerText = "$" + fNum(state.corp.vault);
        
        for(let key in state.corp.lvl) {
            let cost = 5e11 * Math.pow(8, state.corp.lvl[key]);
            document.getElementById('lvl-' + key).innerText = 'v.' + state.corp.lvl[key];
            document.getElementById('fill-' + key).style.width = Math.min(100, (state.corp.lvl[key] * 10)) + '%';
        }

        let stage = officeStages.find(s => s.lvl === state.corp.office);
        document.getElementById('office-interior').innerText = stage.icon;
        document.getElementById('office-label').innerText = stage.n + " DIVISION";
        
        let risk = calcRisk();
        let riskMeter = document.getElementById('risk-meter');
        riskMeter.innerText = risk.toFixed(1) + "%";
        riskMeter.style.color = risk > 70 ? "var(--danger)" : (risk > 40 ? "orange" : "var(--neon)");

        let next = officeStages.find(s => s.lvl === state.corp.office + 1);
        const upBtn = document.getElementById('btn-office-up');
        if(next) {
            upBtn.innerText = `UPGRADE HQ (${fNum(next.cost)})`;
            upBtn.disabled = state.score < next.cost;
        } else {
            upBtn.innerText = "MAX LEVEL";
            upBtn.disabled = true;
        }
    }

    function save() { localStorage.setItem('llama_v_final_all', JSON.stringify(state)); }

    // Игровой цикл
    setInterval(() => {
        if(state.corp.active) {
            let income = calcIncome();
            let risk = calcRisk();
            
            // Шанс кризиса (временная потеря прибыли)
            if(Math.random() * 100 < risk) { 
                income = 0;
            }
            
            state.corp.vault += income;
            updateUI();
        }
    }, 1000);

    // Авто-сохранение раз в 5 сек
    setInterval(save, 5000);

    // Навигация
    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') { save(); window.location.href = 'stock.html'; }
        if (e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') { save(); window.location.href = 'another.html'; }
    });

    init();
</script>
</body>
</html>

    </div>

            <span style="font-size:0.65rem; color:var(--gold); font-family:'Orbitron'">DEPOSIT TO BROKER:</span>

            <button class="btn-action" onclick="transferMoney('deposit', 1000000000)">$1B</button>

        </div>

            <div style="position: absolute; top: 15px; left: 20px; z-index: 2;">
                <span id="active-symbol" style="font-family:'Orbitron'; font-size: 1.8rem; font-weight: 900;">---</span>
            </div>

            </div>

                <button class="trade-btn btn-sell" style="flex:1" onclick="trade('sell')">Sell</button>
                <button class="trade-btn btn-buy" style="flex:1" onclick="trade('buy')">Buy</button>
            </div>

        <div class="section-title">Execution Log</div>

<script defer src="/_vercel/insights/script.js"></script>
<script>
    let state = JSON.parse(localStorage.getItem('llama_v_final_all')) || { score: 0 };
    if(!state.market) state.market = { portfolio: {}, history: {}, logs: [], brokerageBalance: 0 };

    const stocksDef = [
        { s: 'LLMA', n: 'Llama Bank', p: 250 },
        { s: 'MRSX', n: 'Mars Exploration', p: 1800 },
        { s: 'BANA', n: 'Banana PC', p: 400 },
        { s: 'CRPT', n: 'Crypto Fund', p: 80 }
    ];

    let selectedSymbol = 'LLMA';
    const canvas = document.getElementById('tradeChart');
    const ctx = canvas.getContext('2d');

    // Тот самый формат K, M, B, T
    function fNum(n) {
        if (n === 0) return "0";
        const s = ["", "K", "M", "B", "T", "Q"];
        const e = Math.floor(Math.log10(Math.abs(n)) / 3);
        if (e <= 0) return n.toLocaleString();
        return (n / Math.pow(10, e * 3)).toFixed(2) + s[e];
    }

    function init() {
        stocksDef.forEach(st => {
            if(!state.market.history[st.s]) {
                state.market.history[st.s] = Array.from({length: 60}, () => st.p + (Math.random()-0.5)*50);
            }
            if(!state.market.portfolio[st.s]) state.market.portfolio[st.s] = 0;
        });
        updateUI();
        setInterval(tick, 1000);
        window.addEventListener('resize', resize);
        resize();
    }

    function transferMoney(type, amount) {
        if(type === 'deposit') {
            if(state.score >= amount) {
                state.score -= amount;
                state.market.brokerageBalance += amount;
            }
        } else {
            state.score += state.market.brokerageBalance;
            state.market.brokerageBalance = 0;
        }
        save(); updateUI();
    }

    function trade(type) {
        const hist = state.market.history[selectedSymbol];
        const price = hist[hist.length - 1];
        if (type === 'buy' && state.market.brokerageBalance >= price) {
            state.market.brokerageBalance -= price;
            state.market.portfolio[selectedSymbol]++;
            addLog('BUY', price);
        } else if (type === 'sell' && state.market.portfolio[selectedSymbol] > 0) {
            state.market.brokerageBalance += price;
            state.market.portfolio[selectedSymbol]--;
            addLog('SELL', price);
        }
        save(); updateUI();
    }

    function addLog(type, price) {
        state.market.logs.unshift({ type, s: selectedSymbol, p: price, t: new Date().toLocaleTimeString() });
        if(state.market.logs.length > 20) state.market.logs.pop();
        renderLogs();
    }

    function renderLogs() {
        document.getElementById('trade-log').innerHTML = state.market.logs.map(l => `
            <div class="log-item">
                <span style="color:${l.type==='BUY'?'var(--success)':'var(--danger)'}">${l.type} ${l.s}</span>
                <span>$${fNum(l.p)}</span>
            </div>
        `).join('');
    }

    function tick() {
        stocksDef.forEach(st => {
            let h = state.market.history[st.s];
            let last = h[h.length-1];
            // Случайное движение цены
            let change = (Math.random() - 0.48) * (last * 0.04); 
            h.push(Math.max(1, last + change));
            if(h.length > 100) h.shift();
        });
        updateUI();
        draw();
    }

    function updateUI() {
        document.getElementById('wallet-balance').innerText = fNum(state.score);
        document.getElementById('broker-balance').innerText = fNum(state.market.brokerageBalance);
        document.getElementById('user-shares').innerText = fNum(state.market.portfolio[selectedSymbol]);
        document.getElementById('active-symbol').innerText = selectedSymbol;

        const hist = state.market.history[selectedSymbol];
        const curPrice = hist[hist.length-1];
        const prevPrice = hist[hist.length-2];
        const diff = ((curPrice - prevPrice) / prevPrice * 100).toFixed(2);

        document.getElementById('live-price').innerText = "$" + curPrice.toFixed(2);
        const pChange = document.getElementById('price-change');
        pChange.innerText = (diff > 0 ? "▲ " : "▼ ") + Math.abs(diff) + "%";
        pChange.style.color = diff > 0 ? "var(--success)" : "var(--danger)";

        document.getElementById('stock-list').innerHTML = stocksDef.map(st => {
            const p = state.market.history[st.s].slice(-1)[0];
            return `<div class="stock-item ${st.s===selectedSymbol?'active':''}" onclick="selectedSymbol='${st.s}'; updateUI();">
                <span class="stock-ticker">${st.s}</span>
                <span style="color:var(--gold)">$${fNum(p)}</span>
            </div>`;
        }).join('');
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const data = state.market.history[selectedSymbol].slice(-60);
        const max = Math.max(...data) * 1.05;
        const min = Math.min(...data) * 0.95;
        
        // Сетка
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        for(let i=0; i<5; i++) {
            let y = (canvas.height / 4) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // График (Линия)
        ctx.beginPath();
        ctx.strokeStyle = varColor('--neon');
        ctx.lineWidth = 3;
        ctx.shadowBlur = 10;
        ctx.shadowColor = varColor('--neon');
        
        data.forEach((p, i) => {
            const x = (i/(data.length-1)) * canvas.width;
            const y = canvas.height - ((p-min)/(max-min))*canvas.height;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Градиент под графиком
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, 'rgba(0, 255, 204, 0.2)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fill();
    }

    function resize() {
        const container = document.getElementById('canvas-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        draw();
    }

    function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
    function save() { localStorage.setItem('llama_v_final_all', JSON.stringify(state)); }

    window.onkeydown = (e) => { 
        if (e.key === 'ArrowLeft') window.location.href = 'corp.html'; 
        if (e.key === 'ArrowRight') window.location.href = 'country.html'; 
    };

    init();
    renderLogs();
</script>
</body>
</html>

        let currentIndex = 0;
        const frame = document.getElementById('contentFrame');

        function updateFrame() {
            frame.src = pages[currentIndex];
            
            // ГЛАВНЫЙ ХАК: Перехватываем нажатия клавиш внутри iframe после загрузки
            frame.onload = function() {
                try {
                    frame.contentWindow.addEventListener('keydown', (e) => {
                        // Пересылаем событие в родительское окно

                            code: e.code

        }

            if (e.key === "ArrowRight") {
                currentIndex = (currentIndex + 1) % pages.length;
                updateFrame();
            } else if (e.key === "ArrowLeft") {
                currentIndex = (currentIndex - 1 + pages.length) % pages.length;
                updateFrame();
            }
        });

        // Инициализация первой страницы
        updateFrame();

    <script>
        const frame = document.getElementById('contentFrame');
        const pageInfo = document.getElementById('pageInfo');
        let currentIndex = 1;
        const totalPages = 4;

        function updateFrame() {
            // Получаем код из template
            const rawHtml = document.getElementById(`code-${currentIndex}`).innerHTML;
            
            // Создаем Blob (это решает проблему с лимитом длины Base64)
            const blob = new Blob([rawHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            frame.src = url;
            pageInfo.innerText = `Page ${currentIndex} / ${totalPages}`;

            // После загрузки возвращаем фокус на родительское окно
            frame.onload = () => {
                window.focus();
                // Очистка памяти
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            };
        }

        function changePage(dir) {
            currentIndex += dir;
            if (currentIndex > totalPages) currentIndex = 1;
            if (currentIndex < 1) currentIndex = totalPages;
            updateFrame();
        }

        // Слушаем клавиатуру
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") changePage(1);
            if (e.key === "ArrowLeft") changePage(-1);
        });

        // Каждые 2 секунды проверяем фокус (чтобы стрелки не ломались в игре)
        setInterval(() => {
            if (document.activeElement === frame) {
                window.focus();
            }
        }, 2000);

        updateFrame();
    </script>
</body>
