<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLAMA CYBER_PUNK ULTIMATE 2077</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg: #0b0c10;
            --panel: rgba(31, 40, 51, 0.9);
            --cyan: #05d9e8;
            --pink: #ff2a6d;
            --yellow: #f1c40f;
            --text: #e0e6ed;
            --danger: #d90429;
            --neon-shadow: 0 0 15px rgba(5, 217, 232, 0.4);
        }

        body, html {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(5, 217, 232, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(5, 217, 232, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text);
            overflow: hidden; user-select: none;
            text-transform: uppercase;
        }

        /* Full Page Layout */
        .game-wrapper {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebars */
        .sidebar {
            background: var(--panel);
            border-right: 2px solid var(--cyan);
            display: flex; flex-direction: column;
            padding: 20px; overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .sidebar.right {
            border-right: none;
            border-left: 2px solid var(--pink);
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }

        /* Center Area */
        .main-engine {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }

        /* Typography */
        .neon-text { text-shadow: 0 0 10px var(--cyan); color: var(--cyan); }
        .neon-text-pink { text-shadow: 0 0 10px var(--pink); color: var(--pink); }
        h3 { border-bottom: 1px solid var(--cyan); padding-bottom: 8px; margin: 20px 0 15px 0; letter-spacing: 2px; }
        .right h3 { border-bottom-color: var(--pink); }

        /* Buttons */
        .upgrade-card {
            background: rgba(0,0,0,0.5); border: 1px solid var(--cyan);
            padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; width: 100%; box-sizing: border-box;
        }
        .upgrade-card:hover:not(.disabled) { background: rgba(5, 217, 232, 0.15); box-shadow: inset 0 0 10px var(--cyan); }
        .upgrade-card.disabled { opacity: 0.4; cursor: not-allowed; border-color: #444; }
        .upgrade-card .name { font-weight: bold; font-size: 14px; color: #fff; }
        .upgrade-card .cost { color: var(--yellow); font-size: 12px; margin-top: 4px; }

        /* Score & Llama */
        .hud-display {
            text-align: center; background: rgba(0,0,0,0.8);
            padding: 20px 50px; border: 2px solid var(--cyan);
            box-shadow: var(--neon-shadow); margin-bottom: 30px;
        }
        #wool-val { font-size: 4.5rem; font-weight: 700; line-height: 1; margin: 10px 0; }
        
        #llama-btn {
            font-size: 160px; background: none; border: none; outline: none;
            cursor: pointer; transition: transform 0.05s;
            filter: drop-shadow(0 0 20px rgba(5,217,232,0.4));
        }
        #llama-btn:active { transform: scale(0.9); }

        /* Systems */
        .progress-container { width: 350px; height: 12px; border: 1px solid #333; margin-top: 20px; background: #000; }
        #spit-bar { height: 100%; width: 0%; background: var(--danger); transition: 0.1s; box-shadow: 0 0 10px var(--danger); }

        /* Modals */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; align-items: center; justify-content: center; 
            z-index: 100; backdrop-filter: blur(10px);
        }
        .modal { 
            background: #0b0c10; border: 2px solid var(--cyan); padding: 30px;
            width: 450px; text-align: center; box-shadow: 0 0 40px rgba(5,217,232,0.2);
        }
        input { 
            background: #000; border: 1px solid var(--cyan); color: var(--cyan); 
            padding: 10px; width: 80%; margin: 10px 0; font-family: inherit; text-align: center;
        }

        /* Casino Games UI */
        .mines-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 15px auto; width: 210px; }
        .mine-btn { width: 65px; height: 65px; background: #1a1a1a; border: 1px solid var(--pink); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .mine-btn.safe { background: var(--cyan); color: #000; }
        .mine-btn.bomb { background: var(--danger); color: #000; }

        /* Floating Text */
        .float-text { position: absolute; pointer-events: none; color: var(--cyan); font-weight: bold; font-size: 24px; animation: floatUp 0.7s forwards; z-index: 200; }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }

        .action-btn {
            background: #000; border: 2px solid var(--cyan); color: var(--cyan);
            padding: 12px 24px; font-family: inherit; font-weight: bold; cursor: pointer;
            margin: 5px; transition: 0.2s;
        }
        .action-btn:hover { background: var(--cyan); color: #000; }
        .action-btn.pink { border-color: var(--pink); color: var(--pink); }
        .action-btn.pink:hover { background: var(--pink); color: #000; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <!-- Left: Upgrades -->
    <div class="sidebar">
        <h3 class="neon-text">HARDWARE_MODS (CLICK)</h3>
        <div id="list-click"></div>
        <h3 class="neon-text">AUTO_DAEMONS (BOTS)</h3>
        <div id="list-auto"></div>
    </div>

    <!-- Center: Main -->
    <div class="main-engine">
        <div class="hud-display">
            <div style="font-size: 12px; opacity: 0.7; letter-spacing: 3px;">WOOL_RESERVES.DB</div>
            <div id="wool-val" class="neon-text">0</div>
            <div id="rank-tag" style="background: var(--pink); color: #000; padding: 2px 10px; font-weight: bold; display: inline-block;">STREET_KID</div>
            <div style="margin-top: 10px; font-size: 14px;">
                NET_INPUT: <span id="stat-ps" style="color:var(--pink)">0</span>/S | CLICK_FORCE: <span id="stat-cp" style="color:var(--cyan)">1</span>
            </div>
        </div>

        <button id="llama-btn">🦙</button>

        <div class="progress-container"><div id="spit-bar"></div></div>
        <div style="color: var(--danger); font-size: 10px; margin-top: 5px; letter-spacing: 2px;">NEURAL_OVERLOAD_PREVENTION</div>

        <div style="margin-top: 40px; display: flex; gap: 15px;">
            <button class="action-btn pink" onclick="GameUI.show('modal-casino')">DIRTY_CASINO</button>
            <button class="action-btn" style="border-color: var(--yellow); color: var(--yellow);" onclick="GameUI.show('modal-bank')">CORPO_BANK</button>
        </div>
    </div>

    <!-- Right: Specials & Prestige -->
    <div class="sidebar right">
        <h3 class="neon-text-pink">BIOWARE_INJECTS (MULT)</h3>
        <div id="list-spec"></div>
        <h3 class="neon-text-pink">SYSTEM_OVERRIDE</h3>
        <div id="list-prestige"></div>
        
        <button class="action-btn" style="margin-top: auto; border-color: var(--danger); color: var(--danger);" onclick="Core.wipe()">NUCLEAR_RESET</button>
    </div>
</div>

<!-- MODALS -->
<div id="modal-casino" class="overlay">
    <div class="modal" style="border-color: var(--pink);">
        <h2 class="neon-text-pink">NIGHT_CITY_CASINO</h2>
        <div id="casino-main">
            <button class="action-btn pink" style="width: 100%" onclick="Casino.openGame('slots')">🎰 NEON SLOTS</button>
            <button class="action-btn pink" style="width: 100%" onclick="Casino.openGame('crash')">📈 MARKET CRASH</button>
            <button class="action-btn pink" style="width: 100%" onclick="Casino.openGame('mines')">💣 DATA MINES</button>
            <button class="action-btn" style="width: 100%; margin-top: 20px;" onclick="GameUI.hide()">EXIT</button>
        </div>

        <!-- SLOTS -->
        <div id="game-slots" style="display:none;">
            <div id="slot-res" style="font-size: 40px; margin: 20px 0; background: #000; padding: 10px; letter-spacing: 10px;">[ ? ? ? ]</div>
            <input type="number" id="slot-bet" placeholder="BET AMOUNT">
            <button class="action-btn pink" onclick="Casino.playSlots()">SPIN</button>
            <button class="action-btn" onclick="Casino.back()">BACK</button>
        </div>

        <!-- CRASH -->
        <div id="game-crash" style="display:none;">
            <div id="crash-mult" style="font-size: 50px; color: var(--cyan); margin: 20px 0;">1.00x</div>
            <input type="number" id="crash-bet" placeholder="BET AMOUNT">
            <button class="action-btn pink" id="crash-btn" onclick="Casino.startCrash()">INJECT</button>
            <button class="action-btn" onclick="Casino.back()">BACK</button>
        </div>

        <!-- MINES -->
        <div id="game-mines" style="display:none;">
            <div id="mines-info" style="margin-bottom: 10px;">Mult: 1.00x</div>
            <div class="mines-grid" id="mines-board"></div>
            <input type="number" id="mines-bet" placeholder="BET">
            <button class="action-btn pink" id="mines-start-btn" onclick="Casino.startMines()">HACK</button>
            <button class="action-btn yellow" id="mines-cash-btn" style="display:none" onclick="Casino.cashMines()">CASHOUT</button>
            <button class="action-btn" onclick="Casino.back()">BACK</button>
        </div>
    </div>
</div>

<div id="modal-bank" class="overlay">
    <div class="modal" style="border-color: var(--yellow);">
        <h2 style="color: var(--yellow);">CORPO_INVESTMENTS</h2>
        <div id="bank-ui">
            <input type="number" id="bank-deposit" placeholder="AMOUNT TO LOCK">
            <button class="action-btn" style="border-color: var(--yellow); color: var(--yellow); width: 100%" onclick="Bank.lock(1)">1 MIN (+10%)</button>
            <button class="action-btn" style="border-color: var(--yellow); color: var(--yellow); width: 100%" onclick="Bank.lock(60)">1 HOUR (+100%)</button>
        </div>
        <div id="bank-timer" style="display:none; padding: 20px;">
            <h3 id="b-time">00:00</h3>
            <button class="action-btn yellow" id="b-claim" disabled onclick="Bank.claim()">CLAIM</button>
        </div>
        <button class="action-btn" style="width: 100%; margin-top: 15px;" onclick="GameUI.hide()">EXIT</button>
    </div>
</div>

<script>
/* --- CORE SYSTEM --- */
const Core = {
    save: {
        wool: 0, clickPwr: 1, autoPwr: 0, multi: 1, prestige: 1,
        rank: "STREET_KID", inv: {}, bank: { active: false, end: 0, val: 0 }
    },
    temp: { clicks: 0, spit: 0 },
    
    db: {
        click: [
            { id: "c1", n: "CYBER_PLIERS", p: 15, v: 1 },
            { id: "c2", n: "LASER_SHEARS", p: 200, v: 8 },
            { id: "c3", n: "GRAVITY_COMB", p: 3500, v: 50 },
            { id: "c4", n: "MOLECULAR_EXTRACTOR", p: 50000, v: 400 }
        ],
        auto: [
            { id: "a1", n: "SCRAP_BOT", p: 60, v: 2 },
            { id: "a2", n: "SHEPHERD_AI", p: 800, v: 15 },
            { id: "a3", n: "NEURAL_FARM", p: 12000, v: 120 },
            { id: "a4", n: "SATELLITE_LINK", p: 250000, v: 900 }
        ],
        spec: [
            { id: "s1", n: "SYNTH_CACTUS", p: 5000, v: 0.1 },
            { id: "s2", n: "ADRENALINE_CHIP", p: 25000, v: 0.5 }
        ],
        prestige: [
            { id: "p1", n: "EDGE_RUNNER", p: 1000000, v: 5 },
            { id: "p2", n: "NET_GOD", p: 50000000, v: 50 }
        ]
    },

    init() {
        const local = localStorage.getItem('cyber_llama_v3');
        if(local) this.save = JSON.parse(local);
        
        document.getElementById('llama-btn').onclick = (e) => this.click(e);
        setInterval(() => this.tick(), 1000);
        this.render();
        this.update();
        
        // Keybind
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                this.click({clientX: window.innerWidth/2, clientY: window.innerHeight/2});
            }
        });
    },

    click(e) {
        this.temp.clicks++;
        const gain = this.save.clickPwr * this.save.multi * this.save.prestige;
        this.save.wool += gain;
        this.pop(e.clientX, e.clientY, '+' + Math.floor(gain));
        this.update();
    },

    tick() {
        // Auto logic
        this.save.wool += this.save.autoPwr * this.save.multi * this.save.prestige;
        
        // Overheat logic
        if(this.temp.clicks > 8) this.temp.spit = Math.min(100, this.temp.spit + 25);
        else this.temp.spit = Math.max(0, this.temp.spit - 10);
        
        if(this.temp.spit >= 100) {
            this.save.wool *= 0.9;
            this.temp.spit = 0;
            this.pop(window.innerWidth/2, window.innerHeight/2, 'OVERHEAT!', '#ff2a6d');
        }
        
        this.temp.clicks = 0;
        this.bankTick();
        this.update();
        this.saveData();
    },

    bankTick() {
        if(!this.save.bank.active) return;
        const now = Date.now();
        const diff = this.save.bank.end - now;
        if(diff <= 0) {
            document.getElementById('b-time').innerText = "READY";
            document.getElementById('b-claim').disabled = false;
        } else {
            let m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById('b-time').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    },

    update() {
        document.getElementById('wool-val').innerText = Math.floor(this.save.wool).toLocaleString();
        document.getElementById('stat-cp').innerText = Math.floor(this.save.clickPwr * this.save.multi * this.save.prestige);
        document.getElementById('stat-ps').innerText = Math.floor(this.save.autoPwr * this.save.multi * this.save.prestige);
        document.getElementById('spit-bar').style.width = this.temp.spit + "%";
        document.getElementById('rank-tag').innerText = this.save.rank;

        document.querySelectorAll('.upgrade-card').forEach(card => {
            const cost = parseInt(card.dataset.cost);
            card.classList.toggle('disabled', this.save.wool < cost);
        });
    },

    render() {
        const build = (cat, box) => {
            const el = document.getElementById(box);
            el.innerHTML = '';
            this.db[cat].forEach(item => {
                const count = this.save.inv[item.id] || 0;
                const cost = Math.floor(item.p * Math.pow(1.6, count));
                const div = document.createElement('div');
                div.className = 'upgrade-card';
                div.dataset.cost = cost;
                div.innerHTML = `<span class="name">${item.n} [${count}]</span><span class="cost">DATA: ${cost.toLocaleString()} W</span>`;
                div.onclick = () => this.buy(cat, item.id);
                el.appendChild(div);
            });
        };
        build('click', 'list-click');
        build('auto', 'list-auto');
        build('spec', 'list-spec');
        build('prestige', 'list-prestige');
    },

    buy(cat, id) {
        const item = this.db[cat].find(x => x.id === id);
        const count = this.save.inv[id] || 0;
        const cost = Math.floor(item.p * Math.pow(1.6, count));

        if(this.save.wool >= cost) {
            if(cat === 'prestige') {
                if(!confirm("FULL SYSTEM WIPE? (Keep Prestige Multipliers)")) return;
                this.save.prestige *= item.v;
                this.save.rank = item.n;
                this.save.wool = 0; this.save.clickPwr = 1; this.save.autoPwr = 0; this.save.inv = {};
            } else {
                this.save.wool -= cost;
                this.save.inv[id] = count + 1;
                if(cat === 'click') this.save.clickPwr += item.v;
                if(cat === 'auto') this.save.autoPwr += item.v;
                if(cat === 'spec') this.save.multi += item.v;
            }
            this.render(); this.update(); this.saveData();
        }
    },

    pop(x, y, txt, color) {
        const p = document.createElement('div');
        p.className = 'float-text';
        p.innerText = txt;
        if(color) p.style.color = color;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 700);
    },

    saveData() { localStorage.setItem('cyber_llama_v3', JSON.stringify(this.save)); },
    wipe() { if(confirm("FORMAT DRIVE?")) { localStorage.clear(); location.reload(); } }
};

/* --- UI CONTROLLER --- */
const GameUI = {
    show: id => document.getElementById(id).style.display = 'flex',
    hide: () => document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none')
};

/* --- BANK SYSTEM --- */
const Bank = {
    lock(mins) {
        const val = parseInt(document.getElementById('bank-deposit').value);
        if(isNaN(val) || val <= 0 || val > Core.save.wool) return;
        Core.save.wool -= val;
        Core.save.bank = {
            active: true,
            end: Date.now() + (mins * 60000),
            val: Math.floor(val * (mins === 1 ? 1.1 : 2))
        };
        document.getElementById('bank-ui').style.display = 'none';
        document.getElementById('bank-timer').style.display = 'block';
        Core.update();
    },
    claim() {
        if(Date.now() < Core.save.bank.end) return;
        Core.save.wool += Core.save.bank.val;
        Core.save.bank.active = false;
        document.getElementById('bank-ui').style.display = 'block';
        document.getElementById('bank-timer').style.display = 'none';
        document.getElementById('b-claim').disabled = true;
        Core.update();
    }
};

/* --- CASINO SYSTEM --- */
const Casino = {
    active: '',
    openGame(g) {
        document.getElementById('casino-main').style.display = 'none';
        document.getElementById('game-'+g).style.display = 'block';
        this.active = g;
        if(g === 'mines') this.resetMines();
    },
    back() {
        document.querySelectorAll('#modal-casino div[id^="game-"]').forEach(e => e.style.display = 'none');
        document.getElementById('casino-main').style.display = 'block';
    },

    playSlots() {
        const bet = parseInt(document.getElementById('slot-bet').value);
        if(isNaN(bet) || bet <= 0 || bet > Core.save.wool) return;
        Core.save.wool -= bet;
        const syms = ['💎','💀','⚡','🔥'];
        const r = [syms[Math.floor(Math.random()*4)], syms[Math.floor(Math.random()*4)], syms[Math.floor(Math.random()*4)]];
        document.getElementById('slot-res').innerText = `[ ${r[0]} ${r[1]} ${r[2]} ]`;
        if(r[0]===r[1] && r[1]===r[2]) Core.save.wool += bet * 10;
        else if(r[0]===r[1] || r[1]===r[2]) Core.save.wool += bet * 2;
        Core.update();
    },

    // Crash Logic
    crashVal: 1, crashInt: null,
    startCrash() {
        const bet = parseInt(document.getElementById('crash-bet').value);
        if(isNaN(bet) || bet <= 0 || bet > Core.save.wool) return;
        Core.save.wool -= bet;
        const btn = document.getElementById('crash-btn');
        btn.innerText = 'CASH OUT';
        btn.onclick = () => this.cashCrash(bet);
        this.crashVal = 1;
        const limit = Math.random() * 5 + 1;
        this.crashInt = setInterval(() => {
            this.crashVal += 0.02;
            document.getElementById('crash-mult').innerText = this.crashVal.toFixed(2) + 'x';
            if(this.crashVal >= limit) {
                clearInterval(this.crashInt);
                document.getElementById('crash-mult').innerText = 'CRASHED!';
                this.endCrash();
            }
        }, 100);
    },
    cashCrash(bet) {
        clearInterval(this.crashInt);
        Core.save.wool += Math.floor(bet * this.crashVal);
        this.endCrash();
    },
    endCrash() {
        const btn = document.getElementById('crash-btn');
        btn.innerText = 'INJECT';
        btn.onclick = () => this.startCrash();
        Core.update();
    },

    // Mines Logic
    mineBet: 0, mineMult: 1, mineBombs: [], mineOpen: 0,
    resetMines() {
        const board = document.getElementById('mines-board');
        board.innerHTML = '';
        for(let i=0; i<9; i++) {
            const b = document.createElement('button');
            b.className = 'mine-btn';
            b.innerText = '?';
            b.onclick = () => this.clickMine(i, b);
            board.appendChild(b);
        }
    },
    startMines() {
        this.mineBet = parseInt(document.getElementById('mines-bet').value);
        if(isNaN(this.mineBet) || this.mineBet <= 0 || this.mineBet > Core.save.wool) return;
        Core.save.wool -= this.mineBet;
        this.mineBombs = [];
        while(this.mineBombs.length < 3) {
            let r = Math.floor(Math.random()*9);
            if(!this.mineBombs.includes(r)) this.mineBombs.push(r);
        }
        this.mineMult = 1; this.mineOpen = 0;
        document.getElementById('mines-start-btn').style.display = 'none';
        document.getElementById('mines-cash-btn').style.display = 'inline-block';
        this.resetMines();
        Core.update();
    },
    clickMine(i, btn) {
        if(this.mineBombs.includes(i)) {
            btn.innerText = '💀'; btn.className = 'mine-btn bomb';
            this.endMines(false);
        } else {
            btn.innerText = '💎'; btn.className = 'mine-btn safe';
            btn.onclick = null;
            this.mineOpen++;
            this.mineMult += 0.5;
            document.getElementById('mines-info').innerText = `Mult: ${this.mineMult.toFixed(2)}x`;
            if(this.mineOpen === 6) this.cashMines();
        }
    },
    cashMines() {
        Core.save.wool += Math.floor(this.mineBet * this.mineMult);
        this.endMines(true);
    },
    endMines(win) {
        document.getElementById('mines-start-btn').style.display = 'inline-block';
        document.getElementById('mines-cash-btn').style.display = 'none';
        this.mineBombs.forEach(idx => {
            document.getElementById('mines-board').children[idx].innerText = '💀';
        });
        Core.update();
    }
};

window.onload = () => Core.init();
</script>
</body>
</html>
