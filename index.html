<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLAMA CYBER_CLICKER 2077</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg: #0b0c10;
            --panel: rgba(31, 40, 51, 0.9);
            --cyan: #05d9e8;
            --pink: #ff2a6d;
            --yellow: #f1c40f;
            --text: #e0e6ed;
            --danger: #d90429;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(5, 217, 232, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(5, 217, 232, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text);
            overflow: hidden; user-select: none;
            text-transform: uppercase;
        }

        /* Главная сетка на весь экран */
        .game-container {
            display: grid;
            grid-template-columns: 350px 1fr 350px; /* Боковые панели фиксированы, центр тянется */
            height: 100vh;
            width: 100vw;
        }

        /* Панели */
        .sidebar { 
            background: var(--panel); 
            border-right: 2px solid var(--cyan); 
            display: flex; flex-direction: column; 
            padding: 20px; overflow-y: auto; 
            backdrop-filter: blur(10px);
            box-shadow: 10px 0 20px rgba(0,0,0,0.5);
        }
        .sidebar.right { 
            border-right: none; 
            border-left: 2px solid var(--pink); 
            box-shadow: -10px 0 20px rgba(0,0,0,0.5);
        }

        /* Центральная часть */
        .main-stage { 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            position: relative; 
        }

        /* Элементы интерфейса */
        .neon-text { text-shadow: 0 0 10px var(--cyan); color: var(--cyan); }
        .neon-text-pink { text-shadow: 0 0 10px var(--pink); color: var(--pink); }
        
        h3 { border-bottom: 1px solid var(--cyan); padding-bottom: 10px; margin-top: 0; letter-spacing: 2px; font-size: 1.2rem; }
        .sidebar.right h3 { border-bottom-color: var(--pink); color: var(--pink); }

        .cyber-btn {
            background: rgba(0,0,0,0.6); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.2s;
            font-family: inherit; font-size: 14px; font-weight: bold; text-align: left;
            width: 100%; box-sizing: border-box;
        }
        .cyber-btn:hover:not(:disabled) { background: rgba(5,217,232,0.2); box-shadow: 0 0 15px var(--cyan) inset; }
        .cyber-btn:disabled { border-color: #333; color: #555; opacity: 0.5; }
        .price { color: var(--yellow); font-size: 12px; display: block; margin-top: 4px; }

        .score-box { 
            text-align: center; margin-bottom: 40px; 
            border: 2px solid var(--cyan); padding: 30px 60px; 
            background: rgba(0,0,0,0.8); position: relative;
            min-width: 300px;
        }

        #wool-count { font-size: 5rem; font-weight: bold; line-height: 1; }
        
        /* Исправленный кликер */
        #llama-target { 
            font-size: 180px; cursor: pointer; transition: 0.1s; 
            background: none; border: none; outline: none;
            filter: drop-shadow(0 0 25px rgba(5,217,232,0.3));
            z-index: 10;
        }
        #llama-target:active { transform: scale(0.92); filter: drop-shadow(0 0 40px var(--pink)); }

        /* Кнопки действий */
        .action-group { display: flex; gap: 20px; margin-top: 40px; }
        .action-btn { 
            background: #000; border: 2px solid var(--cyan); color: var(--cyan); 
            padding: 15px 30px; font-family: inherit; font-weight: bold; 
            cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .action-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }
        .action-btn.pink { border-color: var(--pink); color: var(--pink); }
        .action-btn.pink:hover { background: var(--pink); color: #000; box-shadow: 0 0 20px var(--pink); }

        /* Прогресс-бар */
        .spit-box { width: 400px; border: 1px solid #222; height: 10px; margin-top: 30px; background: #000; }
        #spit-bar { height: 100%; background: var(--danger); width: 0%; box-shadow: 0 0 15px var(--danger); }

        /* Модалки (Казино/Банк) */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal { background: #0b0c10; padding: 40px; border: 2px solid var(--cyan); width: 450px; text-align: center; }

        /* Частицы клика */
        .particle { position: absolute; pointer-events: none; animation: floatUp 0.6s ease-out forwards; font-size: 30px; z-index: 100; font-weight: bold; color: var(--cyan); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }

        .badge { background: var(--pink); color: #000; padding: 5px 15px; font-weight: bold; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Левая панель -->
        <div class="sidebar">
            <h3 class="neon-text">UPGRADES // HACKS</h3>
            <div id="click-upgrades"></div>
            <br>
            <h3 class="neon-text">AUTOMATION // BOTS</h3>
            <div id="auto-upgrades"></div>
        </div>

        <!-- Центр -->
        <div class="main-stage">
            <div class="score-box">
                <div style="letter-spacing: 4px; opacity: 0.6; font-size: 14px;">NEURON_WOOL COLLECTED</div>
                <div id="wool-count" class="neon-text">0</div>
                <div class="badge" id="rank-name">STREET KID</div>
                <div style="margin-top: 10px; font-weight: bold; color: var(--yellow);">
                    CPS: <span id="cp-val">1</span> | APS: <span id="ps-val">0</span>
                </div>
            </div>

            <button id="llama-target">🦙</button>

            <div class="spit-box"><div id="spit-bar"></div></div>
            <div style="color: var(--danger); font-size: 12px; margin-top: 8px; letter-spacing: 2px;">OVERHEAT_SYNC_STATUS</div>

            <div class="action-group">
                <button class="action-btn pink" onclick="UI.open('casino-hub')">ENTER CASINO</button>
                <button class="action-btn" style="border-color: var(--yellow); color: var(--yellow);" onclick="UI.open('bank-hub')">CORPO BANK</button>
            </div>
        </div>

        <!-- Правая панель -->
        <div class="sidebar right">
            <h3 class="neon-text-pink">CYBERWARE // MULTI</h3>
            <div id="special-upgrades"></div>
            <br>
            <h3 class="neon-text-pink">SYSTEM OVERRIDE</h3>
            <div id="prestige-upgrades"></div>
            
            <button class="action-btn" style="margin-top: auto; border-color: var(--danger); color: var(--danger);" onclick="Llama.wipe()">WIPE ALL DATA</button>
        </div>
    </div>

    <!-- Модалки (функционал сохранен) -->
    <div id="casino-hub" class="overlay">
        <div class="modal" style="border-color: var(--pink);">
            <h2 class="neon-text-pink">CASINO MAINFRAME</h2>
            <button class="action-btn pink" style="width:100%; margin-bottom: 10px;" onclick="alert('Slots coming back...')">SLOTS</button>
            <button class="action-btn" style="width:100%;" onclick="UI.close()">LEAVE</button>
        </div>
    </div>

    <div id="bank-hub" class="overlay">
        <div class="modal" style="border-color: var(--yellow);">
            <h2 style="color: var(--yellow);">BANK ACCESS</h2>
            <p>Authorization required...</p>
            <button class="action-btn" style="width:100%; border-color: var(--danger);" onclick="UI.close()">CANCEL</button>
        </div>
    </div>

    <script>
    const UI = {
        open: id => document.getElementById(id).style.display = 'flex',
        close: () => document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none')
    };

    const Llama = {
        data: {
            wool: 0, clickPwr: 1, autoPwr: 0, multi: 1, prestige: 1,
            rank: "STREET KID", inv: {}
        },
        temp: { spit: 0, clicks: 0 },
        
        db: {
            click: [
                { id: "c1", n: "HOLO-COMB", p: 20, v: 1 },
                { id: "c2", n: "NEON SCISSORS", p: 250, v: 10 },
                { id: "c3", n: "PLASMA SHEARING", p: 5000, v: 150 }
            ],
            auto: [
                { id: "a1", n: "SCRAP DRONE", p: 50, v: 1 },
                { id: "a2", n: "CYBER-SHEPHERD", p: 1000, v: 25 },
                { id: "a3", n: "AI FARM-MATRIX", p: 15000, v: 200 }
            ],
            special: [
                { id: "s1", n: "SYNTH-CACTUS", p: 1000, v: 0.2 },
                { id: "s2", n: "NEURAL LINK", p: 10000, v: 0.5 }
            ],
            prestige: [
                { id: "p1", n: "EDGE-RUNNER", p: 1000000, v: 10 }
            ]
        },

        init() {
            this.load();
            this.render();
            
            // Фикс клика: привязываем к кнопке
            document.getElementById('llama-target').onclick = (e) => this.doClick(e);
            
            setInterval(() => this.tick(), 1000);
            this.update();
        },

        doClick(e) {
            this.temp.clicks++;
            const gain = this.data.clickPwr * this.data.multi * this.data.prestige;
            this.data.wool += gain;
            
            // Эффект цифр на месте клика
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = '+' + Math.floor(gain);
            p.style.left = (e.clientX || window.innerWidth/2) + 'px';
            p.style.top = (e.clientY || window.innerHeight/2) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            
            this.update();
        },

        tick() {
            this.data.wool += this.data.autoPwr * this.data.multi * this.data.prestige;
            
            // Логика перегрева
            if (this.temp.clicks > 8) this.temp.spit = Math.min(100, this.temp.spit + 20);
            else this.temp.spit = Math.max(0, this.temp.spit - 10);
            
            if (this.temp.spit >= 100) {
                this.data.wool *= 0.95;
                this.temp.spit = 0;
            }
            
            this.temp.clicks = 0;
            this.update();
            this.save();
        },

        update() {
            document.getElementById('wool-count').innerText = Math.floor(this.data.wool).toLocaleString();
            document.getElementById('spit-bar').style.width = this.temp.spit + "%";
            document.getElementById('cp-val').innerText = Math.floor(this.data.clickPwr * this.data.multi);
            document.getElementById('ps-val').innerText = Math.floor(this.data.autoPwr * this.data.multi);
            document.getElementById('rank-name').innerText = this.data.rank;
            
            document.querySelectorAll('.cyber-btn').forEach(btn => {
                btn.disabled = this.data.wool < btn.dataset.cost;
            });
        },

        render() {
            const createList = (cat, containerId) => {
                const cont = document.getElementById(containerId);
                cont.innerHTML = '';
                this.db[cat].forEach(item => {
                    const count = this.data.inv[item.id] || 0;
                    const cost = Math.floor(item.p * Math.pow(1.5, count));
                    const btn = document.createElement('button');
                    btn.className = 'cyber-btn';
                    btn.dataset.cost = cost;
                    btn.innerHTML = `${item.n} [${count}] <span class="price">${cost} W</span>`;
                    btn.onclick = () => {
                        if (this.data.wool >= cost) {
                            this.data.wool -= cost;
                            this.data.inv[item.id] = count + 1;
                            if(cat === 'click') this.data.clickPwr += item.v;
                            if(cat === 'auto') this.data.autoPwr += item.v;
                            if(cat === 'special') this.data.multi += item.v;
                            this.render(); this.update();
                        }
                    };
                    cont.appendChild(btn);
                });
            };
            createList('click', 'click-upgrades');
            createList('auto', 'auto-upgrades');
            createList('special', 'special-upgrades');
            createList('prestige', 'prestige-upgrades');
        },

        save() { localStorage.setItem('cyber_llama_save', JSON.stringify(this.data)); },
        load() { 
            const saved = localStorage.getItem('cyber_llama_save');
            if(saved) this.data = JSON.parse(saved);
        },
        wipe() { if(confirm("DELETE ALL?")) { localStorage.clear(); location.reload(); } }
    };

    window.onload = () => Llama.init();
    </script>
</body>
</html>
