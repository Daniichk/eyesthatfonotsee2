    function loadModule(base64Data) {
        if (!base64Data || base64Data.length < 10) return;
        try {
            const decodedHTML = atob(base64Data);
            document.open();
            document.write(decodedHTML);
            document.close();
            
            // После подмены контента СРАЗУ вешаем управление заново
            injectNavigation();
        } catch (e) {
            console.error("Decryption Error.");
        }
    }

    function injectNavigation() {
        document.addEventListener('keydown', function(event) {
            // Активация игры (Ctrl + Shift + 6) -> Переход в КЛИКЕР
            if (event.ctrlKey && event.shiftKey && event.code === 'Digit6') {
                loadModule(BASE64_CLICKER);
            }
            // Навигация по страницам
            else if (event.key === 'ArrowRight') {
                loadModule(BASE64_COUNTRY);
            } 
            else if (event.key === 'ArrowLeft') {
                loadModule(BASE64_STOCK);
            }
            else if (event.key === 'ArrowUp') { // КОРПОРАЦИЯ
                loadModule(BASE64_CORP);
            }
            else if (event.key === 'ArrowDown') { // Вернуться в ГЛАВНЫЙ КЛИКЕР
                loadModule(BASE64_CLICKER);
            }
        });
    }

    // Запуск системы управления
    injectNavigation();
