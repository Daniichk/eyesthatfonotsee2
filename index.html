<head>

    <title>Nexus Vanguard | Global Systems & Infrastructure</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #86868b;
            --accent: #0071e3;
            --bg: #000000;
            --glass: rgba(22, 22, 23, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--primary); 
            overflow: hidden;
            line-height: 1.5;
        }

        /* Corporate Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 48px;
            background: var(--glass); backdrop-filter: blur(20px);
            z-index: 1000; display: flex; justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-content {
            width: 100%; max-width: 1000px; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 20px;
        }
        .nav-content a {
            color: var(--primary); text-decoration: none; font-size: 12px;
            letter-spacing: 0.5px; opacity: 0.8; transition: 0.3s;
        }
        .nav-content a:hover { opacity: 1; color: var(--accent); }

        /* Hero Section */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            padding: 20px;
        }
        .hero h1 {
            font-size: clamp(40px, 8vw, 90px); font-weight: 800;
            letter-spacing: -0.02em; margin-bottom: 20px;
            background: linear-gradient(180deg, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: clamp(18px, 2vw, 24px); color: var(--secondary);
            max-width: 700px; font-weight: 300;
        }

        /* Fake Content Section */
        .features {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px; padding: 100px 20px; max-width: 1100px; margin: 0 auto;
        }
        .feature-card {
            background: #161617; padding: 40px; border-radius: 20px;
            border: 1px solid #333;
        }

        /* Secret Overlay */
        #portal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 999999; display: none; background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>

    const panicUrl = "https://classroom.google.com";
    const idleLimit = 5 * 60 * 1000; // 5 minutes
    let idleTimer;

    // Reset timer on any activity
    function resetTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(autoPanic, idleLimit);
    }

    function autoPanic() {
        const overlay = document.getElementById('portal-overlay');
        if (overlay.style.display === 'block') {
            window.location.href = panicUrl;
        }
    }

    function unlockPortal() {
        const overlay = document.getElementById('portal-overlay');
        const frame = document.getElementById('portal-frame');

        try {
            // Fixes the Emoji/Llama icons by using Blob decoding
            const binary = atob(secretData);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            
            const blob = new Blob([bytes], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            overlay.style.display = 'block';
            frame.src = url;
            frame.focus();

            // Start tracking activity once game is open
            setupActivityTracking(frame);
        } catch (e) {
            console.error("Payload Error");
        }
    }

    function setupActivityTracking(iframe) {
        const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
        
        // Track main page
        events.forEach(name => document.addEventListener(name, resetTimer, true));

        // Track inside game
        iframe.onload = () => {
            const frameDoc = iframe.contentWindow.document;
            events.forEach(name => frameDoc.addEventListener(name, resetTimer, true));
        };
        
        resetTimer();
    }

    document.addEventListener('keydown', (e) => {
        // Ctrl + Shift + 6: Launch Game
        if (e.ctrlKey && e.shiftKey && e.keyCode === 54) {
            e.preventDefault();
            unlockPortal();
        }

        // Escape: Instant Panic redirect
        if (e.key === "Escape") {
            const overlay = document.getElementById('portal-overlay');
            if (overlay.style.display === 'block') {
                window.location.href = panicUrl;
            }
        }
    });
</script>
