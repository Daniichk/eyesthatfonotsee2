<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Llama Stock Exchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ffcc; --gold: #ffd700; --bg: #05050a;
            --danger: #ff0055; --glass: rgba(20, 20, 35, 0.95);
        }
        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* Шапка */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: rgba(255,255,255,0.02); border-bottom: 1px solid #222;
        }
        .balance-box { font-family: 'Orbitron'; color: var(--gold); font-size: 1.2rem; }

        /* Основной контейнер */
        .main-layout {
            display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 80px);
        }

        /* Список акций слева */
        .stock-sidebar {
            border-right: 1px solid #222; overflow-y: auto; background: #080810;
        }
        .stock-item {
            padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s;
        }
        .stock-item:hover { background: #1a1a2e; }
        .stock-item.active { background: #152238; border-left: 4px solid var(--neon); }
        .stock-symbol { font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; }
        .stock-price-mini { color: var(--gold); font-size: 0.9rem; }

        /* Зона графика */
        .chart-zone { padding: 20px; display: flex; flex-direction: column; }
        .chart-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .timeframes { display: flex; gap: 8px; }
        .tf-btn {
            background: #1a1a1a; border: 1px solid #333; color: #888;
            padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 0.8rem;
        }
        .tf-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,204,0.1); }

        #canvas-container {
            flex-grow: 1; background: #000; border: 1px solid #222; border-radius: 8px;
            position: relative; overflow: hidden; min-height: 300px;
        }
        canvas { width: 100%; height: 100%; }

        /* Панель торговли */
        .trade-panel {
            margin-top: 20px; background: #111; padding: 20px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-buy { background: #00c853; color: white; border: none; padding: 15px 40px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; }
        .btn-sell { background: #ff1744; color: white; border: none; padding: 15px 40px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; }
        .btn-buy:active, .btn-sell:active { transform: scale(0.95); }

        .nav-hint { position: fixed; bottom: 10px; left: 10px; color: #444; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-family: 'Orbitron'; color: var(--neon);">TERMINAL v3.0</div>
    <div class="balance-box">CASH: $<span id="user-balance">0</span></div>
</div>

<div class="main-layout">
    <div class="stock-sidebar" id="stock-list">
        </div>

    <div class="chart-zone">
        <div class="chart-header">
            <div>
                <span id="active-name" style="font-size: 1.5rem; font-weight: 900;">SELECT ASSET</span>
                <span id="active-symbol" style="color: #666; margin-left: 10px;">----</span>
            </div>
            <div class="timeframes" id="tf-group">
                <button class="tf-btn active" data-v="1">1s</button>
                <button class="tf-btn" data-v="5">5s</button>
                <button class="tf-btn" data-v="30">30s</button>
                <button class="tf-btn" data-v="60">1m</button>
                <button class="tf-btn" data-v="1800">30m</button>
                <button class="tf-btn" data-v="3600">1h</button>
                <button class="tf-btn" data-v="86400">1d</button>
                <button class="tf-btn" data-v="2592000">1M</button>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="tradeChart"></canvas>
        </div>

        <div class="trade-panel">
            <div>
                <div style="font-size: 0.8rem; color: #777;">ТВОЙ ПОРТФЕЛЬ</div>
                <div style="font-size: 1.2rem;"><span id="user-shares">0</span> АКЦИЙ</div>
            </div>
            <div style="text-align: center;">
                <div style="font-size: 0.8rem; color: #777;">ТЕКУЩАЯ ЦЕНА</div>
                <div style="font-size: 2rem; color: var(--gold); font-weight: 900;">$<span id="live-price">0.00</span></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-sell" onclick="trade('sell')">SELL</button>
                <button class="btn-buy" onclick="trade('buy')">BUY</button>
            </div>
        </div>
    </div>
</div>

<div class="nav-hint">← Нажми Arrow Left, чтобы вернуться в офис</div>

<script>
    // --- ДАННЫЕ И КОНФИГУРАЦИЯ ---
    let state = JSON.parse(localStorage.getItem('llama_v_final_all')) || { score: 0 };
    
    // Инициализация данных биржи в глобальном стейте
    if(!state.market) {
        state.market = {
            portfolio: {}, 
            history: {}, // Сюда пишем секундные тики
            lastTick: Date.now()
        };
    }

    const stocksDef = [
        { s: 'LLMA', n: 'Llama Bank', vol: 0.01, p: 150 },
        { s: 'MRSX', n: 'Mars-X Heavy', vol: 0.08, p: 1200 },
        { s: 'BANA', n: 'Banana PC', vol: 0.03, p: 450 },
        { s: 'CRPT', n: 'CryptoLama Fund', vol: 0.15, p: 60 },
        { s: 'OILG', n: 'Global Oil', vol: 0.02, p: 800 },
        { s: 'BIOL', n: 'BioLife Corp', vol: 0.06, p: 200 },
        { s: 'GOLD', n: 'Llama Gold', vol: 0.005, p: 2400 },
        { s: 'FASH', n: 'Fashion Chain', vol: 0.04, p: 120 },
        { s: 'AILG', n: 'AI Logic', vol: 0.07, p: 900 },
        { s: 'MEGA', n: 'Your Mega Corp', vol: 0.02, p: 1000 }
    ];

    let selectedSymbol = 'LLMA';
    let currentTf = 1; // Секунды
    const canvas = document.getElementById('tradeChart');
    const ctx = canvas.getContext('2d');

    // --- ЛОГИКА РЫНКА ---
    function initMarket() {
        stocksDef.forEach(st => {
            if(!state.market.history[st.s]) {
                // Генерируем начальную историю (100 точек)
                let p = st.p;
                state.market.history[st.s] = Array.from({length: 200}, () => {
                    p += (Math.random() - 0.5) * (p * st.vol);
                    return p;
                });
            }
            if(!state.market.portfolio[st.s]) state.market.portfolio[st.s] = 0;
        });
        renderSidebar();
        selectStock('LLMA');
    }

    function renderSidebar() {
        const list = document.getElementById('stock-list');
        list.innerHTML = stocksDef.map(st => {
            const hist = state.market.history[st.s];
            const curr = hist[hist.length - 1];
            const prev = hist[hist.length - 2];
            const color = curr >= prev ? 'var(--neon)' : 'var(--danger)';
            return `
                <div class="stock-item ${st.s === selectedSymbol ? 'active' : ''}" onclick="selectStock('${st.s}')">
                    <div class="stock-symbol">${st.s}</div>
                    <div style="font-size:0.7rem; color:#666;">${st.n}</div>
                    <div class="stock-price-mini" style="color:${color}">$${curr.toFixed(2)}</div>
                </div>
            `;
        }).join('');
    }

    function selectStock(symbol) {
        selectedSymbol = symbol;
        const st = stocksDef.find(s => s.s === symbol);
        document.getElementById('active-name').innerText = st.n;
        document.getElementById('active-symbol').innerText = st.s;
        renderSidebar();
        updateTradeUI();
    }

    // --- ТРЕЙДИНГ ---
    function trade(type) {
        const hist = state.market.history[selectedSymbol];
        const price = hist[hist.length - 1];

        if(type === 'buy') {
            if(state.score >= price) {
                state.score -= price;
                state.market.portfolio[selectedSymbol]++;
            }
        } else {
            if(state.market.portfolio[selectedSymbol] > 0) {
                state.score += price;
                state.market.portfolio[selectedSymbol]--;
            }
        }
        save();
        updateTradeUI();
    }

    function updateTradeUI() {
        document.getElementById('user-balance').innerText = Math.floor(state.score).toLocaleString();
        document.getElementById('user-shares').innerText = state.market.portfolio[selectedSymbol];
        const hist = state.market.history[selectedSymbol];
        document.getElementById('live-price').innerText = hist[hist.length-1].toFixed(2);
    }

    // --- ГРАФИК ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const rawData = state.market.history[selectedSymbol];
        
        // Фильтрация данных под таймфрейм
        // Чем больше таймфрейм, тем больше точек мы пропускаем
        let displayData = [];
        for(let i = rawData.length - 1; i >= 0; i -= currentTf) {
            displayData.unshift(rawData[i]);
            if(displayData.length > 60) break; // Видим 60 свечей/точек
        }

        const max = Math.max(...displayData) * 1.02;
        const min = Math.min(...displayData) * 0.98;
        const range = max - min;

        // Рисуем сетку
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        for(let i=0; i<5; i++) {
            let y = (canvas.height / 5) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // Рисуем линию цены
        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = displayData[displayData.length-1] >= displayData[0] ? '#00ffcc' : '#ff0055';
        
        displayData.forEach((p, i) => {
            const x = (i / (displayData.length - 1)) * canvas.width;
            const y = canvas.height - ((p - min) / range) * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Градиент под линией
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, displayData[displayData.length-1] >= displayData[0] ? 'rgba(0,255,204,0.2)' : 'rgba(255,0,85,0.2)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fill();
    }

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---
    function save() { localStorage.setItem('llama_v_final_all', JSON.stringify(state)); }

    function tick() {
        stocksDef.forEach(st => {
            const hist = state.market.history[st.s];
            let lastPrice = hist[hist.length - 1];
            // Случайное блуждание
            let change = (Math.random() - 0.5) * (lastPrice * st.vol);
            hist.push(Math.max(1, lastPrice + change));
            if(hist.length > 1000) hist.shift(); // Храним 1000 секунд истории
        });
        
        if(state.market) renderSidebar();
        updateTradeUI();
        draw();
    }

    // Таймфреймы
    document.getElementById('tf-group').onclick = (e) => {
        if(e.target.classList.contains('tf-btn')) {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentTf = parseInt(e.target.dataset.v);
        }
    }

    // Навигация
    window.onkeydown = (e) => {
        if(e.key === 'ArrowLeft') window.location.href = 'corp.html';
    };

    // Ресайз канваса
    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }

    window.onresize = resize;
    resize();
    initMarket();
    setInterval(tick, 1000);
</script>

</body>
</html>
