<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Llama Stock Exchange: Pro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ffcc; --gold: #ffd700; --bg: #05050a;
            --danger: #ff1744; --success: #00c853; --glass: rgba(20, 20, 35, 0.95);
        }
        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            overflow: hidden; height: 100vh; font-size: 14px;
        }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(255,255,255,0.01); border-bottom: 1px solid #1a1a1a;
        }
        .balance-box { font-family: 'Orbitron'; color: var(--gold); font-size: 1.1rem; }

        /* Main Layout */
        .main-layout {
            display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 65px);
        }

        /* Stock List (Left Sidebar) */
        .stock-sidebar {
            border-right: 1px solid #1a1a1a; overflow-y: auto; background: #080810; scrollbar-width: thin;
        }
        .sidebar-title { font-family: 'Orbitron'; color: #444; font-size: 0.7rem; padding: 15px 15px 5px 15px; }
        
        .stock-item {
            padding: 12px 15px; border-bottom: 1px solid #141414; cursor: pointer; transition: 0.1s;
        }
        .stock-item:hover { background: #1a1a2e; }
        .stock-item.active { background: #152238; border-left: 3px solid var(--neon); }
        .stock-symbol { font-family: 'Orbitron'; font-weight: 900; font-size: 1rem; letter-spacing: 1px; }
        .stock-price-mini { color: var(--gold); font-size: 0.85rem; font-weight: bold; }

        /* Chart Zone */
        .chart-zone { padding: 20px; display: flex; flex-direction: column; overflow: hidden;}
        .chart-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        
        .timeframes { display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 4px; border-radius: 6px;}
        .tf-btn {
            background: none; border: 1px solid transparent; color: #777;
            padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; transition: 0.2s;
        }
        .tf-btn:hover { color: #fff; }
        .tf-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,204,0.05); font-weight: bold; }

        #canvas-container {
            flex-grow: 1; background: #000; border: 1px solid #1a1a1a; border-radius: 8px;
            position: relative; overflow: hidden; min-height: 250px;
        }
        canvas { width: 100%; height: 100%; }

        /* Trading Panel (Bottom) */
        .trade-panel {
            margin-top: 20px; background: #111; padding: 15px 20px; border-radius: 12px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border: 1px solid #1a1a1a;
        }
        .trade-stat { text-align: left; }
        .trade-stat small { font-size: 0.7rem; color: #666; font-family: 'Orbitron'; letter-spacing: 1px; }
        .trade-stat div { font-size: 1.3rem; font-weight: bold; }

        .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        .trade-btn {
            border: none; padding: 15px 35px; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; font-weight: 900; font-size: 0.9rem; transition: 0.1s;
        }
        .trade-btn:active { transform: scale(0.96); }
        .btn-buy { background: var(--success); color: #000; }
        .btn-sell { background: var(--danger); color: #fff; }

        /* News & Navigation Hints */
        .nav-hint { position: fixed; bottom: 10px; left: 10px; color: #2a2a2a; font-size: 0.65rem; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="nav-hint">← Press ARROW LEFT to Office</div>

<div class="header">
    <div style="font-family: 'Orbitron'; color: var(--neon);">LSE TERMINAL [LIVE]</div>
    <div class="balance-box">AVAILABLE: $<span id="user-balance">0.00</span></div>
</div>

<div class="main-layout">
    <div class="stock-sidebar">
        <div class="sidebar-title">ASSETS [10]</div>
        <div id="stock-list">
            </div>
    </div>

    <div class="chart-zone">
        <div class="chart-header">
            <div>
                <span id="active-name" style="font-size: 1.6rem; font-weight: 900;">SELECT STOCK</span>
                <span id="active-symbol" style="color: #666; margin-left: 10px; font-family: 'Orbitron';">---</span>
            </div>
            <div class="timeframes" id="tf-group">
                <button class="tf-btn active" data-v="1">1S</button>
                <button class="tf-btn" data-v="5">5S</button>
                <button class="tf-btn" data-v="30">30S</button>
                <button class="tf-btn" data-v="60">1M</button>
                <button class="tf-btn" data-v="1800">30M</button>
                <button class="tf-btn" data-v="3600">1H</button>
                <button class="tf-btn" data-v="86400">1D</button>
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="tradeChart"></canvas>
        </div>

        <div class="trade-panel">
            <div class="trade-stat">
                <small>YOUR HOLDINGS</small>
                <div><span id="user-shares">0</span> <span style="font-size:0.8rem; color:#444;">SHARES</span></div>
            </div>
            <div class="trade-stat" style="text-align: center;">
                <small>MARKET PRICE</small>
                <div style="color: var(--gold); font-size: 2.2rem;">$<span id="live-price">0.00</span></div>
            </div>
            <div class="btn-group">
                <button class="trade-btn btn-sell" onclick="trade('sell')">SELL</button>
                <button class="trade-btn btn-buy" onclick="trade('buy')">BUY</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Load Game State
    let state = JSON.parse(localStorage.getItem('llama_v_final_all')) || { score: 0 };
    
    // Init market data if missing
    if(!state.market) {
        state.market = {
            portfolio: {}, 
            history: {}, 
            lastTick: Date.now()
        };
    }

    const stocksDef = [
        { s: 'LLMA', n: 'Llama Central Bank', vol: 0.008, p: 250 },
        { s: 'MRSX', n: 'Mars-X Exploration', vol: 0.12, p: 2200 },
        { s: 'BANA', n: 'Banana PC Systems', vol: 0.04, p: 450 },
        { s: 'CRPT', n: 'CryptoLama ETF', vol: 0.22, p: 90 },
        { s: 'OILG', n: 'Oil-Gas Global', vol: 0.025, p: 750 },
        { s: 'BIOL', n: 'BioLife Genetics', vol: 0.08, p: 310 },
        { s: 'GOLD', n: 'Physical Gold ETF', vol: 0.003, p: 2600 },
        { s: 'FASH', n: 'Fashion Chain PLC', vol: 0.05, p: 140 },
        { s: 'AILG', n: 'AI Logic Neural', vol: 0.09, p: 1100 },
        { s: 'MEGA', n: 'Mega Corp Holdings', vol: 0.02, p: 1300 }
    ];

    let selectedSymbol = 'LLMA';
    let currentTf = 1; // Seconds
    const canvas = document.getElementById('tradeChart');
    const ctx = canvas.getContext('2d');

    function initMarket() {
        stocksDef.forEach(st => {
            if(!state.market.history[st.s]) {
                let p = st.p;
                state.market.history[st.s] = Array.from({length: 150}, () => {
                    p += (Math.random() - 0.5) * (p * st.vol);
                    return Math.max(1, p);
                });
            }
            if(!state.market.portfolio[st.s]) state.market.portfolio[st.s] = 0;
        });
        renderSidebar();
        selectStock('LLMA');
    }

    function renderSidebar() {
        const list = document.getElementById('stock-list');
        list.innerHTML = stocksDef.map(st => {
            const hist = state.market.history[st.s];
            const curr = hist[hist.length - 1];
            const prev = hist[Math.max(0, hist.length - 2)];
            const changeColor = curr >= prev ? 'var(--neon)' : 'var(--danger)';
            return `
                <div class="stock-item ${st.s === selectedSymbol ? 'active' : ''}" onclick="selectStock('${st.s}')">
                    <div style="display:flex; justify-content:space-between;">
                        <div class="stock-symbol">${st.s}</div>
                        <div class="stock-price-mini" style="color:${changeColor}">$${curr.toFixed(2)}</div>
                    </div>
                    <div style="font-size:0.75rem; color:#555; text-transform:uppercase;">${st.n}</div>
                </div>
            `;
        }).join('');
    }

    function selectStock(symbol) {
        selectedSymbol = symbol;
        const st = stocksDef.find(s => s.s === symbol);
        document.getElementById('active-name').innerText = st.n;
        document.getElementById('active-symbol').innerText = st.s;
        renderSidebar();
        updateTradeUI();
    }

    function trade(type) {
        const hist = state.market.history[selectedSymbol];
        const price = hist[hist.length - 1];

        if(type === 'buy') {
            if(state.score >= price) {
                state.score -= price;
                state.market.portfolio[selectedSymbol]++;
            }
        } else {
            if(state.market.portfolio[selectedSymbol] > 0) {
                state.score += price;
                state.market.portfolio[selectedSymbol]--;
            }
        }
        save();
        updateTradeUI();
    }

    function updateTradeUI() {
        document.getElementById('user-balance').innerText = Math.floor(state.score).toLocaleString() + ".00";
        document.getElementById('user-shares').innerText = state.market.portfolio[selectedSymbol];
        const hist = state.market.history[selectedSymbol];
        document.getElementById('live-price').innerText = hist[hist.length-1].toFixed(2);
    }

    // DRAW CHART [LIVE]
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const rawData = state.market.history[selectedSymbol];
        if(!rawData) return;
        
        let displayData = [];
        // Extract data based on timeframe
        for(let i = rawData.length - 1; i >= 0; i -= currentTf) {
            displayData.unshift(rawData[i]);
            if(displayData.length > 80) break; // View 80 points
        }
        if(displayData.length < 2) return;

        const max = Math.max(...displayData) * 1.015; // 1.5% padding
        const min = Math.min(...displayData) * 0.985;
        const range = max - min;
        const isBullish = displayData[displayData.length-1] >= displayData[0];
        const color = isBullish ? varColor('--neon') : varColor('--danger');

        // Draw Price Line
        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = color;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        
        displayData.forEach((p, i) => {
            const x = (i / (displayData.length - 1)) * canvas.width;
            const y = canvas.height - ((p - min) / range) * canvas.height;
            if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Area Gradient
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, isBullish ? 'rgba(0,255,204,0.15)' : 'rgba(255,23,68,0.15)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fill();

        // Crosshair point
        ctx.beginPath();
        ctx.fillStyle = color;
        const lastP = displayData[displayData.length - 1];
        const lastX = canvas.width;
        const lastY = canvas.height - ((lastP - min) / range) * canvas.height;
        ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function save() { localStorage.setItem('llama_v_final_all', JSON.stringify(state)); }

    function tick() {
        stocksDef.forEach(st => {
            const hist = state.market.history[st.s];
            let lastPrice = hist[hist.length - 1];
            // Random Walk with volatility
            let change = (Math.random() - 0.5) * (lastPrice * st.vol);
            hist.push(Math.max(1, lastPrice + change));
            if(hist.length > 2000) hist.shift(); // Keep 2000s history
        });
        
        renderSidebar();
        updateTradeUI();
        draw();
    }

    // Timeframe interaction
    document.getElementById('tf-group').onclick = (e) => {
        if(e.target.classList.contains('tf-btn')) {
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentTf = parseInt(e.target.dataset.v);
            draw(); // Redraw instantly
        }
    }

    // Navigation Back
    window.onkeydown = (e) => {
        if(e.key === 'ArrowLeft') window.location.href = 'corp.html';
    };

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        draw();
    }

    window.onresize = resize;
    resize();
    initMarket();
    setInterval(tick, 1000); // Main tick 1/sec
</script>

</body>
</html>
