<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5033520721992478"
     crossorigin="anonymous"></script>
    <title>Llama Pro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ffcc; --gold: #ffd700; --bg: #050508;
            --danger: #ff1744; --success: #00e676; --glass: rgba(10, 10, 20, 0.95);
            --border: #1a1a2e;
        }
        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            overflow: hidden; height: 100vh; font-size: 13px;
        }

        /* --- HEADER --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 25px; background: #0a0a1a; border-bottom: 1px solid var(--border);
        }
        .balance-group { display: flex; gap: 30px; align-items: center; }
        .main-balance { font-family: 'Orbitron'; color: #666; font-size: 0.75rem; }
        .broker-balance { font-family: 'Orbitron'; color: var(--gold); font-size: 1.1rem; }

        /* --- LAYOUT --- */
        .main-layout {
            display: grid; grid-template-columns: 260px 1fr 300px; height: calc(100vh - 55px);
        }

        .sidebar { background: #07070f; border-right: 1px solid var(--border); overflow-y: auto; }
        .sidebar-right { border-left: 1px solid var(--border); background: #05050a; }
        
        .section-title { 
            font-family: 'Orbitron'; color: #444; font-size: 0.6rem; 
            padding: 15px; letter-spacing: 2px; text-transform: uppercase;
        }

        .stock-item {
            padding: 12px 20px; border-bottom: 1px solid #111; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .stock-item:hover { background: rgba(0,255,204,0.05); }
        .stock-item.active { background: rgba(0,255,204,0.1); border-left: 3px solid var(--neon); }
        .stock-ticker { font-family: 'Orbitron'; font-weight: 900; }

        /* --- CENTER ZONE --- */
        .center-zone { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        #canvas-container { 
            flex-grow: 1; background: #000; border: 1px solid var(--border); 
            border-radius: 8px; position: relative;
        }
        canvas { width: 100%; height: 100%; }

        .transfer-panel {
            background: rgba(255,215,0,0.03); padding: 10px 20px; border-radius: 8px;
            display: flex; gap: 12px; align-items: center; border: 1px solid rgba(255,215,0,0.1);
        }
        .btn-action { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 5px 10px; border-radius: 4px; font-family: 'Orbitron'; font-size: 0.65rem; cursor: pointer;
        }
        .btn-action:hover { background: var(--neon); color: black; }

        .trade-panel {
            background: #0d0d1a; padding: 20px; border-radius: 12px;
            display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; border: 1px solid var(--border);
        }

        .price-display { font-size: 2.2rem; font-family: 'Orbitron'; font-weight: 900; color: var(--gold); }
        .trade-btn { 
            border: none; padding: 15px; border-radius: 6px; font-family: 'Orbitron'; 
            cursor: pointer; font-weight: 900; text-transform: uppercase; transition: 0.2s;
        }
        .btn-buy { background: var(--success); color: #000; }
        .btn-sell { background: var(--danger); color: #fff; }
        .trade-btn:active { transform: scale(0.95); }

        .log-item { padding: 8px 15px; border-bottom: 1px solid #111; font-size: 0.7rem; display: flex; justify-content: space-between; }
        .nav-hint { font-size: 0.7rem; color: #444; font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div class="header">
    <div class="balance-group">
        <div style="font-family: 'Orbitron'; color: var(--neon); font-weight: 900; letter-spacing: 2px;">LLAMA TERMINAL</div>
        <div class="main-balance">WALLET: <span style="color:white">$<span id="wallet-balance">0</span></span></div>
        <div class="broker-balance">BROKERAGE: $<span id="broker-balance">0</span></div>
    </div>
    <div class="nav-hint">← [A] HQ | COUNTRY [D] →</div>
</div>

<div class="main-layout">
    <div class="sidebar">
        <div class="section-title">Market Assets</div>
        <div id="stock-list"></div>
    </div>

    <div class="center-zone">
        <div class="transfer-panel">
            <span style="font-size:0.65rem; color:var(--gold); font-family:'Orbitron'">DEPOSIT TO BROKER:</span>
            <button class="btn-action" onclick="transferMoney('deposit', 1000000)">$1M</button>
            <button class="btn-action" onclick="transferMoney('deposit', 1000000000)">$1B</button>
            <button class="btn-action" onclick="transferMoney('withdraw')">WITHDRAW ALL</button>
        </div>

        <div id="canvas-container">
            <div style="position: absolute; top: 15px; left: 20px; z-index: 2;">
                <span id="active-symbol" style="font-family:'Orbitron'; font-size: 1.8rem; font-weight: 900;">---</span>
            </div>
            <canvas id="tradeChart"></canvas>
        </div>

        <div class="trade-panel">
            <div>
                <div style="color:#666; font-size:0.65rem; font-family:'Orbitron'; margin-bottom: 5px;">SHARES OWNED</div>
                <div style="font-size:1.6rem; font-family:'Orbitron'"><span id="user-shares">0</span></div>
            </div>
            <div style="text-align: center;">
                <div id="live-price" class="price-display">0.00</div>
                <div id="price-change" style="font-size: 0.85rem; font-weight: bold;">0.00%</div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="trade-btn btn-sell" style="flex:1" onclick="trade('sell')">Sell</button>
                <button class="trade-btn btn-buy" style="flex:1" onclick="trade('buy')">Buy</button>
            </div>
        </div>
    </div>

    <div class="sidebar sidebar-right">
        <div class="section-title">Execution Log</div>
        <div id="trade-log"></div>
    </div>
</div>
<script defer src="/_vercel/insights/script.js"></script>
<script>
    let state = JSON.parse(localStorage.getItem('llama_v_final_all')) || { score: 0 };
    if(!state.market) state.market = { portfolio: {}, history: {}, logs: [], brokerageBalance: 0 };

    const stocksDef = [
        { s: 'LLMA', n: 'Llama Bank', p: 250 },
        { s: 'MRSX', n: 'Mars Exploration', p: 1800 },
        { s: 'BANA', n: 'Banana PC', p: 400 },
        { s: 'CRPT', n: 'Crypto Fund', p: 80 }
    ];

    let selectedSymbol = 'LLMA';
    const canvas = document.getElementById('tradeChart');
    const ctx = canvas.getContext('2d');

    // Тот самый формат K, M, B, T
    function fNum(n) {
        if (n === 0) return "0";
        const s = ["", "K", "M", "B", "T", "Q"];
        const e = Math.floor(Math.log10(Math.abs(n)) / 3);
        if (e <= 0) return n.toLocaleString();
        return (n / Math.pow(10, e * 3)).toFixed(2) + s[e];
    }

    function init() {
        stocksDef.forEach(st => {
            if(!state.market.history[st.s]) {
                state.market.history[st.s] = Array.from({length: 60}, () => st.p + (Math.random()-0.5)*50);
            }
            if(!state.market.portfolio[st.s]) state.market.portfolio[st.s] = 0;
        });
        updateUI();
        setInterval(tick, 1000);
        window.addEventListener('resize', resize);
        resize();
    }

    function transferMoney(type, amount) {
        if(type === 'deposit') {
            if(state.score >= amount) {
                state.score -= amount;
                state.market.brokerageBalance += amount;
            }
        } else {
            state.score += state.market.brokerageBalance;
            state.market.brokerageBalance = 0;
        }
        save(); updateUI();
    }

    function trade(type) {
        const hist = state.market.history[selectedSymbol];
        const price = hist[hist.length - 1];
        if (type === 'buy' && state.market.brokerageBalance >= price) {
            state.market.brokerageBalance -= price;
            state.market.portfolio[selectedSymbol]++;
            addLog('BUY', price);
        } else if (type === 'sell' && state.market.portfolio[selectedSymbol] > 0) {
            state.market.brokerageBalance += price;
            state.market.portfolio[selectedSymbol]--;
            addLog('SELL', price);
        }
        save(); updateUI();
    }

    function addLog(type, price) {
        state.market.logs.unshift({ type, s: selectedSymbol, p: price, t: new Date().toLocaleTimeString() });
        if(state.market.logs.length > 20) state.market.logs.pop();
        renderLogs();
    }

    function renderLogs() {
        document.getElementById('trade-log').innerHTML = state.market.logs.map(l => `
            <div class="log-item">
                <span style="color:${l.type==='BUY'?'var(--success)':'var(--danger)'}">${l.type} ${l.s}</span>
                <span>$${fNum(l.p)}</span>
            </div>
        `).join('');
    }

    function tick() {
        stocksDef.forEach(st => {
            let h = state.market.history[st.s];
            let last = h[h.length-1];
            // Случайное движение цены
            let change = (Math.random() - 0.48) * (last * 0.04); 
            h.push(Math.max(1, last + change));
            if(h.length > 100) h.shift();
        });
        updateUI();
        draw();
    }

    function updateUI() {
        document.getElementById('wallet-balance').innerText = fNum(state.score);
        document.getElementById('broker-balance').innerText = fNum(state.market.brokerageBalance);
        document.getElementById('user-shares').innerText = fNum(state.market.portfolio[selectedSymbol]);
        document.getElementById('active-symbol').innerText = selectedSymbol;

        const hist = state.market.history[selectedSymbol];
        const curPrice = hist[hist.length-1];
        const prevPrice = hist[hist.length-2];
        const diff = ((curPrice - prevPrice) / prevPrice * 100).toFixed(2);

        document.getElementById('live-price').innerText = "$" + curPrice.toFixed(2);
        const pChange = document.getElementById('price-change');
        pChange.innerText = (diff > 0 ? "▲ " : "▼ ") + Math.abs(diff) + "%";
        pChange.style.color = diff > 0 ? "var(--success)" : "var(--danger)";

        document.getElementById('stock-list').innerHTML = stocksDef.map(st => {
            const p = state.market.history[st.s].slice(-1)[0];
            return `<div class="stock-item ${st.s===selectedSymbol?'active':''}" onclick="selectedSymbol='${st.s}'; updateUI();">
                <span class="stock-ticker">${st.s}</span>
                <span style="color:var(--gold)">$${fNum(p)}</span>
            </div>`;
        }).join('');
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const data = state.market.history[selectedSymbol].slice(-60);
        const max = Math.max(...data) * 1.05;
        const min = Math.min(...data) * 0.95;
        
        // Сетка
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        for(let i=0; i<5; i++) {
            let y = (canvas.height / 4) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // График (Линия)
        ctx.beginPath();
        ctx.strokeStyle = varColor('--neon');
        ctx.lineWidth = 3;
        ctx.shadowBlur = 10;
        ctx.shadowColor = varColor('--neon');
        
        data.forEach((p, i) => {
            const x = (i/(data.length-1)) * canvas.width;
            const y = canvas.height - ((p-min)/(max-min))*canvas.height;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Градиент под графиком
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, 'rgba(0, 255, 204, 0.2)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fill();
    }

    function resize() {
        const container = document.getElementById('canvas-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        draw();
    }

    function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
    function save() { localStorage.setItem('llama_v_final_all', JSON.stringify(state)); }

    window.onkeydown = (e) => { 
        if (e.key === 'ArrowLeft') window.location.href = 'corp.html'; 
        if (e.key === 'ArrowRight') window.location.href = 'country.html'; 
    };

    init();
    renderLogs();
</script>
</body>
</html>
