<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Llama Corp: Headquarters</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5033520721992478"
     crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ffcc; --gold: #ffd700; --bg: #05050a;
            --danger: #ff0055; --glass: rgba(10, 10, 20, 0.9);
            --border: rgba(0, 255, 204, 0.3);
        }
        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* Фоновая анимация сетки */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.05; z-index: 0;
            transform: perspective(500px) rotateX(60deg); transform-origin: center bottom;
        }

        #office-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 60%;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 1;
        }
        #office-interior { 
            font-size: 12rem; filter: drop-shadow(0 0 30px var(--neon)); 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #office-interior:hover { transform: scale(1.1); }

        .ui-layer {
            position: fixed; bottom: 0; width: 100%; height: 42%;
            background: var(--glass); border-top: 2px solid var(--neon);
            backdrop-filter: blur(10px); z-index: 10; padding: 25px; box-sizing: border-box;
            display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 25px;
            box-shadow: 0 -10px 30px rgba(0, 255, 204, 0.1);
        }

        .stat-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 15px; border-radius: 12px; position: relative;
        }
        .stat-card h2 { margin: 0 0 10px 0; font-family: 'Orbitron'; color: var(--neon); font-size: 0.9rem; letter-spacing: 2px; }
        
        .dept-btn {
            background: rgba(0, 255, 204, 0.05); border: 1px solid var(--neon);
            color: white; padding: 12px; margin: 8px 0; width: 100%;
            cursor: pointer; border-radius: 6px; font-family: 'Orbitron';
            transition: 0.2s; display: flex; justify-content: space-between;
        }
        .dept-btn:hover:not(:disabled) { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }
        .dept-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #444; }

        #setup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .industry-card {
            padding: 25px; border: 1px solid var(--neon); margin: 15px;
            width: 280px; cursor: pointer; border-radius: 15px; transition: 0.4s;
            background: rgba(0, 255, 204, 0.02); text-align: center;
        }
        .industry-card:hover { transform: translateY(-10px); background: var(--neon); color: black; }

        .progress-bar { width: 100%; height: 4px; background: #111; border-radius: 2px; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: var(--neon); width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--neon); }

        .nav-hint { position: fixed; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; color: #444; font-family: 'Orbitron'; font-size: 0.7rem; z-index: 5; }
        
        .cash-anim {
            position: absolute; color: var(--gold); font-weight: bold; font-family: 'Orbitron';
            animation: floatUp 1s forwards; pointer-events: none;
        }
        @keyframes floatUp { 
            0% { transform: translateY(0); opacity: 1; } 
            100% { transform: translateY(-100px); opacity: 0; } 
        }
    </style>
</head>
<body>

<div class="nav-hint">
    <span>[A] ← STREET</span>
    <span>STOCKS [D] →</span>
</div>

<div id="setup-overlay" style="display: none;">
    <h1 style="font-family:'Orbitron'; letter-spacing: 5px; margin-bottom: 40px;">SELECT INDUSTRY</h1>
    <div id="industry-list" style="display: flex;"></div>
</div>

<div id="office-view">
    <div id="office-interior">📦</div>
    <h1 id="corp-name-display" style="font-family:'Orbitron'; margin-top: 20px; letter-spacing: 10px;">LLAMA CORP</h1>
    <div id="office-label" style="color: var(--gold); font-family: 'Orbitron'; font-size: 0.8rem;">BASEMENT DIVISION</div>
</div>

<div class="ui-layer">
    <div class="stat-card">
        <h2>FINANCIALS</h2>
        <div id="corp-balance" style="font-size: 1.8rem; font-weight: 900; color: white;">0</div>
        <div style="margin: 10px 0; font-size: 0.9rem;">
            Net: <span id="corp-income" style="color:var(--neon)">+0</span>/s<br>
            Risk: <span id="risk-meter">0%</span>
        </div>
        <button onclick="collectMoney(event)" id="collect-btn" class="dept-btn" style="background:var(--gold); color:black; border:none; margin-top:15px;">
            COLLECT VAULT <span id="vault-amount">$0</span>
        </button>
    </div>

    <div class="stat-card">
        <h2>DEPARTMENTS</h2>
        <button class="dept-btn" onclick="upgradeDept('prod')">PRODUCT <span id="lvl-prod">v0</span></button>
        <div class="progress-bar"><div id="fill-prod" class="progress-fill"></div></div>
        
        <button class="dept-btn" onclick="upgradeDept('mkt')">MARKETING <span id="lvl-mkt">v0</span></button>
        <div class="progress-bar"><div id="fill-mkt" class="progress-fill"></div></div>
        
        <button class="dept-btn" onclick="upgradeDept('hr')">SECURITY <span id="lvl-hr">v0</span></button>
        <div class="progress-bar"><div id="fill-hr" class="progress-fill"></div></div>
    </div>

    <div class="stat-card">
        <h2>HQ EXPANSION</h2>
        <div id="office-desc" style="font-size: 0.8rem; margin-bottom: 10px; color: #aaa;">Status: Startup</div>
        <button class="dept-btn" id="btn-office-up" onclick="upgradeOffice()">UPGRADE HQ</button>
        <p style="font-size: 0.7rem; color: #555; line-height: 1.4; margin-top: 15px;">
            * Higher tier offices reduce operational risks and multiply base revenue.
        </p>
    </div>
</div>
<script defer src="/_vercel/insights/script.js"></script>
<script>
    let state = JSON.parse(localStorage.getItem('llama_v_final_all')) || { score: 0 };
    
    if(!state.corp) {
        state.corp = {
            active: false, industry: null, lvl: { prod: 0, mkt: 0, hr: 0 },
            office: 1, vault: 0, lastTick: Date.now()
        };
    }

    const industries = [
        { id: 'tech', n: 'NEURAL NETWORKS', i: '🧠', riskBase: 5, mult: 2, desc: 'Stable and scalable' },
        { id: 'fashion', n: 'CYBER WEAR', i: '🧥', riskBase: 15, mult: 6, desc: 'Trend dependent' },
        { id: 'space', n: 'ASTEROID MINING', i: '☄️', riskBase: 35, mult: 20, desc: 'High risk, stellar profit' } 
    ];

    const officeStages = [
        { lvl: 1, icon: '📦', n: 'BASEMENT', cost: 0 },
        { lvl: 2, icon: '🏢', n: 'OFFICE CENTER', cost: 1e12 },
        { lvl: 3, icon: '🏙️', n: 'SKYSCRAPER', cost: 1e16 },
        { lvl: 4, icon: '💎', n: 'ORBITAL STATION', cost: 1e20 }
    ];

    function fNum(n) {
        if (n < 1e6) return n.toLocaleString();
        if (n < 1e9) return (n/1e6).toFixed(2) + "M";
        if (n < 1e12) return (n/1e9).toFixed(2) + "B";
        if (n < 1e15) return (n/1e12).toFixed(2) + "T";
        if (n < 1e18) return (n/1e15).toFixed(2) + "Q";
        return n.toExponential(2);
    }

    function init() {
        if(!state.corp.active) {
            document.getElementById('setup-overlay').style.display = 'flex';
            document.getElementById('industry-list').innerHTML = industries.map(ind => `
                <div class="industry-card" onclick="startCorp('${ind.id}')">
                    <div style="font-size: 3rem; margin-bottom: 10px;">${ind.i}</div>
                    <div style="font-family:'Orbitron'; font-weight:900;">${ind.n}</div>
                    <p style="font-size:0.8rem; height:40px;">${ind.desc}</p>
                    <div style="font-size:0.7rem; color:var(--neon)">MULT: x${ind.mult} | RISK: ${ind.riskBase}%</div>
                </div>
            `).join('');
        }
        updateUI();
    }

    function startCorp(id) {
        state.corp.active = true;
        state.corp.industry = id;
        document.getElementById('setup-overlay').style.display = 'none';
        save();
        updateUI();
    }

    function upgradeDept(type) {
        let currentLvl = state.corp.lvl[type];
        let cost = 5e11 * Math.pow(8, currentLvl); 
        
        if(state.score >= cost) {
            state.score -= cost;
            state.corp.lvl[type]++;
            save();
            updateUI();
        }
    }

    function upgradeOffice() {
        let next = officeStages.find(s => s.lvl === state.corp.office + 1);
        if(next && state.score >= next.cost) {
            state.score -= next.cost;
            state.corp.office++;
            save();
            updateUI();
        }
    }

    function collectMoney(e) {
        if(state.corp.vault <= 0) return;
        
        // Анимация цифр
        const anim = document.createElement('div');
        anim.className = 'cash-anim';
        anim.innerText = '+' + fNum(state.corp.vault);
        anim.style.left = e.clientX + 'px';
        anim.style.top = e.clientY + 'px';
        document.body.appendChild(anim);
        setTimeout(() => anim.remove(), 1000);

        state.score += state.corp.vault;
        state.corp.vault = 0;
        save();
        updateUI();
    }

    function calcIncome() {
        if(!state.corp.active) return 0;
        let ind = industries.find(i => i.id === state.corp.industry);
        let base = (state.corp.lvl.prod + 1) * (state.corp.lvl.mkt + 1) * 5e8;
        return base * ind.mult * Math.pow(2, state.corp.office - 1);
    }

    function calcRisk() {
        if(!state.corp.active) return 0;
        let ind = industries.find(i => i.id === state.corp.industry);
        let risk = ind.riskBase + (state.corp.lvl.mkt * 3) - (state.corp.lvl.hr * 5) - (state.corp.office * 2);
        return Math.max(2, Math.min(95, risk));
    }

    function updateUI() {
        if(!state.corp.active) return;

        document.getElementById('corp-balance').innerText = "$" + fNum(state.score);
        document.getElementById('corp-income').innerText = "+" + fNum(calcIncome());
        document.getElementById('vault-amount').innerText = "$" + fNum(state.corp.vault);
        
        for(let key in state.corp.lvl) {
            let cost = 5e11 * Math.pow(8, state.corp.lvl[key]);
            document.getElementById('lvl-' + key).innerText = 'v.' + state.corp.lvl[key];
            document.getElementById('fill-' + key).style.width = Math.min(100, (state.corp.lvl[key] * 10)) + '%';
        }

        let stage = officeStages.find(s => s.lvl === state.corp.office);
        document.getElementById('office-interior').innerText = stage.icon;
        document.getElementById('office-label').innerText = stage.n + " DIVISION";
        
        let risk = calcRisk();
        let riskMeter = document.getElementById('risk-meter');
        riskMeter.innerText = risk.toFixed(1) + "%";
        riskMeter.style.color = risk > 70 ? "var(--danger)" : (risk > 40 ? "orange" : "var(--neon)");

        let next = officeStages.find(s => s.lvl === state.corp.office + 1);
        const upBtn = document.getElementById('btn-office-up');
        if(next) {
            upBtn.innerText = `UPGRADE HQ (${fNum(next.cost)})`;
            upBtn.disabled = state.score < next.cost;
        } else {
            upBtn.innerText = "MAX LEVEL";
            upBtn.disabled = true;
        }
    }

    function save() { localStorage.setItem('llama_v_final_all', JSON.stringify(state)); }

    // Игровой цикл
    setInterval(() => {
        if(state.corp.active) {
            let income = calcIncome();
            let risk = calcRisk();
            
            // Шанс кризиса (временная потеря прибыли)
            if(Math.random() * 100 < risk) { 
                income = 0;
            }
            
            state.corp.vault += income;
            updateUI();
        }
    }, 1000);

    // Авто-сохранение раз в 5 сек
    setInterval(save, 5000);

    // Навигация
    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') { save(); window.location.href = 'stock.html'; }
        if (e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') { save(); window.location.href = 'game.html'; }
    });

    init();
</script>
</body>
</html>
